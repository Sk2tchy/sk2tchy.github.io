<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKETCHY | Studio</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;600;800&display=swap');

        :root {
            --bg: #000000;
            --text: #ffffff;
            --muted: #666666;
            --surface: #0a0a0a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Manrope', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Ta tvoje textura */
        .noise-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            pointer-events: none;
            opacity: 0.05;
            background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23n)"/></svg>');
        }

        /* Navbar */
        nav {
            position: fixed;
            top: 0; width: 100%;
            padding: 2.5rem 5vw;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            mix-blend-mode: difference;
        }

        .logo { font-size: 1.2rem; font-weight: 800; letter-spacing: -0.05em; text-transform: uppercase; }
        .nav-links { display: flex; gap: 3rem; }
        .nav-links a { 
            text-decoration: none; color: var(--text); font-size: 0.85rem; font-weight: 600; 
            text-transform: uppercase; letter-spacing: 0.05em;
            position: relative; overflow: hidden;
        }
        
        .nav-links a::after {
            content: ''; position: absolute; bottom: -2px; left: 0; width: 100%; height: 1px;
            background: currentColor; transform: translateX(-101%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .nav-links a:hover::after { transform: translateX(0); }

        /* Cinematic Hero */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 5vw;
            position: relative;
        }

        .hero-bg {
            position: absolute; inset: 0; z-index: -1;
            background: radial-gradient(circle at 50% 50%, #111 0%, #000 100%);
            opacity: 0; transition: opacity 2s ease;
        }

        .title-mask { overflow: hidden; display: block; line-height: 1.1; }
        .title-mask span {
            display: block;
            transform: translateY(110%);
            transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        h1 { font-size: clamp(4rem, 12vw, 12rem); font-weight: 800; letter-spacing: -0.04em; text-transform: uppercase; margin-left: -0.5vw; }
        .subtitle { font-size: clamp(1rem, 2vw, 1.5rem); color: var(--muted); font-weight: 400; margin-top: 2rem; max-width: 600px; }

        /* Projects Section */
        .projects-wrapper {
            padding-top: 20vh;
            background: var(--bg);
            position: relative;
            z-index: 10;
        }

        .section-title {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
            padding: 0 5vw;
            margin-bottom: 3rem;
            font-weight: 600;
        }

        .project-row {
            display: block;
            width: 100%;
            height: 75vh;
            position: relative;
            overflow: hidden;
            border-top: 1px solid rgba(255,255,255,0.05);
            text-decoration: none;
            color: white;
            cursor: pointer;
        }

        .project-bg {
            position: absolute; inset: 0;
            background-color: var(--surface);
            background-size: cover; background-position: center;
            transform: scale(1);
            transition: transform 1.5s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 1;
        }
        
        /* Sem pak hodis ty fotky z enginu */
        #p1 .project-bg { background-image: linear-gradient(to top, rgba(0,0,0,0.9), transparent), url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><rect width="100%" height="100%" fill="%230a0a0a"/></svg>'); }
        #p2 .project-bg { background-image: linear-gradient(to top, rgba(0,0,0,0.9), transparent), url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><rect width="100%" height="100%" fill="%230f0f0f"/></svg>'); }

        .project-content {
            position: absolute; bottom: 0; left: 0; width: 100%;
            padding: 4rem 5vw; z-index: 2;
            display: flex; justify-content: space-between; align-items: flex-end;
        }

        .project-row:hover .project-bg { transform: scale(1.05); }

        .project-title { font-size: 4rem; font-weight: 800; letter-spacing: -0.02em; transform: translateY(20px); opacity: 0; transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        .project-meta { color: var(--muted); font-size: 1rem; transform: translateY(20px); opacity: 0; transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.1s; }

        .project-row:hover .project-title, 
        .project-row:hover .project-meta { transform: translateY(0); opacity: 1; }

        /* Footer */
        footer {
            padding: 10vh 5vw;
            display: flex; justify-content: space-between; align-items: flex-end;
            border-top: 1px solid rgba(255,255,255,0.05);
            margin-top: 2px;
        }

        .socials { display: flex; gap: 2rem; }
        .socials a { color: var(--text); transition: opacity 0.3s; }
        .socials a:hover { opacity: 0.5; }

        .copyright { color: var(--muted); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }

        /* Animacni tridy */
        .is-loaded .title-mask span { transform: translateY(0); }
        .is-loaded .hero-bg { opacity: 1; }

        .reveal-up { transform: translateY(50px); opacity: 0; transition: all 1s cubic-bezier(0.16, 1, 0.3, 1); }
        .reveal-up.in-view { transform: translateY(0); opacity: 1; }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            .project-content { flex-direction: column; align-items: flex-start; gap: 1rem; }
            .project-row:hover .project-title, .project-row:hover .project-meta { transform: none; opacity: 1; }
            .project-title, .project-meta { opacity: 1; transform: translateY(0); font-size: 2.5rem; }
            footer { flex-direction: column; align-items: flex-start; gap: 3rem; }
        }
    </style>
</head>
<body>

    <div class="noise-overlay"></div>

    <nav>
        <div class="logo">Sketchy</div>
        <div class="nav-links">
            <a href="#work">Work</a>
            <a href="#about">Studio</a>
            <a href="#contact">Contact</a>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-bg" data-speed="0.5"></div>
        <h1>
            <span class="title-mask"><span>Architect</span></span>
            <span class="title-mask" style="transition-delay: 0.1s;"><span>Of The Void</span></span>
        </h1>
        <div class="title-mask" style="transition-delay: 0.3s;">
            <p class="subtitle">Building immersive digital environments and complex game mechanics. Independent game development studio.</p>
        </div>
    </header>

    <main class="projects-wrapper" id="work">
        <div class="section-title reveal-up">Selected Projects</div>

        <a href="#" class="project-row reveal-up" id="p1">
            <div class="project-bg" data-speed="0.2"></div>
            <div class="project-content">
                <div class="project-title">Project Eclipse</div>
                <div class="project-meta">Technical Breakdown / Engine / 2026</div>
            </div>
        </a>

        <a href="#" class="project-row reveal-up" id="p2">
            <div class="project-bg" data-speed="0.2"></div>
            <div class="project-content">
                <div class="project-title">Velocity Core</div>
                <div class="project-meta">Kinematics / Physics / 2025</div>
            </div>
        </a>
    </main>

    <footer id="contact">
        <div>
            <div class="section-title" style="padding:0; margin-bottom: 2rem;">Connect</div>
            <div class="socials">
                <a href="#"><i data-lucide="twitter"></i></a>
                <a href="#"><i data-lucide="github"></i></a>
                <a href="#"><i data-lucide="youtube"></i></a>
            </div>
        </div>
        <div class="copyright">© 2026 Sketchy Studio</div>
    </footer>

    <script>
        lucide.createIcons();

        // Spusteni uvodni animace
        window.onload = () => {
            requestAnimationFrame(() => {
                document.body.classList.add('is-loaded');
            });
        };

        // Profi parallax a maskovani na scroll
        const scrollObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('in-view');
                    scrollObserver.unobserve(entry.target);
                }
            });
        }, { threshold: 0.15 });

        document.querySelectorAll('.reveal-up').forEach(el => scrollObserver.observe(el));

        // Smooth Parallax
        window.addEventListener('scroll', () => {
            const scrolled = window.scrollY;
            
            // Hero parallax fade
            const hero = document.querySelector('.hero');
            if(scrolled < window.innerHeight) {
                hero.style.transform = `translateY(${scrolled * 0.3}px)`;
                hero.style.opacity = 1 - (scrolled / window.innerHeight) * 1.5;
            }

            // Image parallax
            document.querySelectorAll('.project-bg').forEach(bg => {
                const speed = bg.getAttribute('data-speed');
                const parent = bg.parentElement;
                const rect = parent.getBoundingClientRect();
                
                if (rect.top < window.innerHeight && rect.bottom > 0) {
                    const yPos = (rect.top - window.innerHeight/2) * speed;
                    bg.style.transform = `translateY(${yPos}px) scale(1.1)`;
                }
            });
        });
    </script>
</body>
</html>
