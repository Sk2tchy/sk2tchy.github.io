<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sketchy Studio | Industrial Dev</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap');

        :root {
            --bg: #010308;
            --hero-top: #0a1120;
            --accent: #00f2ff;
            --text: #ffffff;
            --text-dim: #7a8d9c;
            --glass: rgba(5, 10, 20, 0.4);
            --expo: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        body, html { 
            background: var(--bg); color: var(--text); 
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden; width: 100%; scroll-behavior: smooth;
        }

        /* Background & Particles */
        #particles-canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
        .noise-overlay { position: fixed; inset: 0; z-index: 100; pointer-events: none; opacity: 0.03; background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3"/></filter><rect width="100%" height="100%" filter="url(%23noise)"/></svg>'); }

        /* Cursor */
        #cursor {
            position: fixed; top: 0; left: 0; width: 8px; height: 8px; 
            background: var(--accent); border-radius: 50%; pointer-events: none; z-index: 9999;
            transform: translate3d(-50%, -50%, 0); transition: width 0.3s var(--expo), height 0.3s var(--expo), background 0.3s var(--expo);
        }
        body.hovering #cursor { width: 50px; height: 50px; background: rgba(0, 242, 255, 0.1); border: 1px solid var(--accent); }

        /* Navbar */
        nav {
            position: fixed; top: 0; width: 100%; padding: 2.5rem 5vw; 
            display: flex; justify-content: space-between; align-items: center; z-index: 1000;
        }
        .nav-logo { font-family: 'Montserrat', sans-serif; font-weight: 900; letter-spacing: 2px; text-decoration: none; color: white; }
        .nav-logo span { color: var(--accent); }
        .nav-links { display: flex; gap: 3rem; }
        .nav-links a { color: var(--text-dim); text-decoration: none; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 3px; font-weight: 600; transition: 0.3s; }
        .nav-links a:hover { color: white; text-shadow: 0 0 10px rgba(255,255,255,0.5); }

        /* Hero with Sinking Overlay */
        .hero { 
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; 
            position: relative; z-index: 10;
            background: radial-gradient(circle at top, var(--hero-top) 0%, var(--bg) 70%);
        }
        .sinking-layer {
            position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 40%, var(--bg) 95%);
            pointer-events: none; z-index: 5;
        }
        #hero-content { text-align: center; z-index: 10; will-change: transform, opacity; }
        .hero h1 {
            font-family: 'Montserrat', sans-serif; font-size: clamp(3rem, 10vw, 8.5rem);
            font-weight: 900; letter-spacing: -4px; line-height: 0.85;
            background: linear-gradient(180deg, #fff 0%, #444 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .hero-subtitle { color: var(--accent); letter-spacing: 15px; text-transform: uppercase; font-size: 0.7rem; margin-top: 2rem; opacity: 0.8; }

        .scroll-indicator { position: absolute; bottom: 3rem; left: 50%; transform: translateX(-50%); opacity: 0.5; z-index: 10; }
        .mouse { width: 20px; height: 32px; border: 2px solid white; border-radius: 15px; position: relative; }
        .wheel { width: 2px; height: 6px; background: white; position: absolute; top: 6px; left: 50%; transform: translateX(-50%); animation: scrollMouse 2s infinite; }
        @keyframes scrollMouse { 0% { opacity: 1; transform: translateX(-50%) translateY(0); } 100% { opacity: 0; transform: translateX(-50%) translateY(15px); } }

        /* Section Base */
        section { padding: 10rem 5vw; position: relative; z-index: 20; background: var(--bg); }
        .reveal { opacity: 0; transform: translateY(30px); transition: 1.2s var(--expo); }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* 3D Projects Grid */
        .projects-container { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); 
            gap: 2.5rem; max-width: 1400px; margin: 0 auto; perspective: 1000px;
        }
        
        .card-perspective { perspective: 1000px; transition: 0.5s var(--expo); }
        
        .project-card {
            background: #03070e; border: 1px solid rgba(255,255,255,0.03); border-radius: 20px;
            padding: 3.5rem 2.5rem; height: 100%; position: relative; overflow: hidden;
            transform-style: preserve-3d; transition: border-color 0.3s;
        }
        
        /* Spotlight Effect */
        .project-card::before {
            content: ""; position: absolute; inset: 0;
            background: radial-gradient(600px circle at var(--mouse-x) var(--mouse-y), rgba(0, 242, 255, 0.08), transparent 40%);
            z-index: 0; pointer-events: none;
        }

        .project-card:hover { border-color: rgba(0, 242, 255, 0.3); }
        .card-content { position: relative; z-index: 1; pointer-events: none; transform: translateZ(50px); }
        
        .p-icon { color: var(--accent); margin-bottom: 2rem; display: block; filter: drop-shadow(0 0 10px rgba(0,242,255,0.3)); }
        .p-title { font-family: 'Montserrat', sans-serif; font-size: 1.8rem; margin-bottom: 1rem; }
        .p-desc { color: var(--text-dim); line-height: 1.7; font-size: 0.95rem; }

        /* Footer */
        footer { padding: 8rem 5vw 4rem; display: flex; flex-direction: column; align-items: center; gap: 4rem; border-top: 1px solid rgba(255,255,255,0.02); }
        .social-links { display: flex; gap: 5rem; }
        .social-link { 
            color: var(--text-dim); text-decoration: none; font-weight: 600; letter-spacing: 2px; font-size: 0.8rem;
            display: flex; align-items: center; gap: 10px; transition: 0.4s;
        }
        .social-link:hover { color: var(--accent); text-shadow: 0 0 20px var(--accent); transform: translateY(-5px); }

        /* Modal */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(1, 3, 8, 0.98); z-index: 5000;
            display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: 0.5s var(--expo);
        }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        .modal-content { width: 90%; max-width: 1000px; max-height: 85vh; overflow-y: auto; padding: 4rem; position: relative; }
        .close-btn { position: fixed; top: 2rem; right: 2rem; background: none; border: 1px solid rgba(255,255,255,0.1); color: white; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            .projects-container { grid-template-columns: 1fr; }
            .social-links { gap: 2rem; flex-direction: column; align-items: center; }
            #cursor { display: none; }
        }
    </style>
</head>
<body>

    <div class="noise-overlay"></div>
    <canvas id="particles-canvas"></canvas>
    <div id="cursor"></div>

    <nav>
        <a href="#" class="nav-logo interactive">SKETCHY<span>STUDIO</span></a>
        <div class="nav-links">
            <a href="#about" class="interactive">Origin</a>
            <a href="#work" class="interactive">Archive</a>
            <a href="#contact" class="interactive">Signal</a>
        </div>
    </nav>

    <div class="hero">
        <div class="sinking-layer"></div>
        <div id="hero-content">
            <h1 class="interactive">VOID<br>ENGINEER</h1>
            <p class="hero-subtitle">Interactive Systems & Game Design</p>
        </div>
        <div class="scroll-indicator">
            <div class="mouse"><div class="wheel"></div></div>
        </div>
    </div>

    <section id="work">
        <h2 class="p-title reveal" style="font-size: 3rem; margin-bottom: 5rem; text-align: center;">SELECTED ARCHIVE</h2>
        <div class="projects-container" id="projects-grid">
            <!-- Dynamically injected -->
        </div>
    </section>

    <footer id="contact">
        <div class="social-links">
            <a href="#" class="social-link interactive"><i data-lucide="youtube" size="18"></i> YouTube</a>
            <a href="#" class="social-link interactive"><i data-lucide="message-square" size="18"></i> Discord</a>
            <a href="#" class="social-link interactive"><i data-lucide="instagram" size="18"></i> Instagram</a>
        </div>
    </footer>

    <div class="modal-overlay" id="modal">
        <button class="close-btn interactive" onclick="closeModal()"><i data-lucide="x"></i></button>
        <div class="modal-content" id="modal-body"></div>
    </div>

    <script>
        // Projects Data
        const projects = [
            { id: '1', title: 'Deep State', icon: 'zap', desc: 'Atmospheric underwater simulation with procedural ecosystem logic.', long: 'A full-scale dive into procedural world-building. Deep State utilizes a custom AI behavior tree for aquatic life.' },
            { id: '2', title: 'Kinematics', icon: 'cpu', desc: 'Advanced character physics engine for high-fidelity movement.', long: 'This system replaces standard animation blending with real-time physics-based weight and inertia calculations.' },
            { id: '3', title: 'Aura UI', icon: 'layers', desc: 'Minimalist interface framework for diegetic game menus.', long: 'Aura focuses on 3D space UI elements that react to light and movement within the game world.' }
        ];

        // Render & 3D Effect
        const grid = document.getElementById('projects-grid');
        projects.forEach(p => {
            const wrapper = document.createElement('div');
            wrapper.className = 'card-perspective reveal';
            wrapper.innerHTML = `
                <div class="project-card interactive" onclick="openModal('${p.id}')">
                    <div class="card-content">
                        <i data-lucide="${p.icon}" class="p-icon" size="32"></i>
                        <h3 class="p-title">${p.title}</h3>
                        <p class="p-desc">${p.desc}</p>
                    </div>
                </div>
            `;
            grid.appendChild(wrapper);
        });
        lucide.createIcons();

        // 3D Tilt & Spotlight Script
        document.addEventListener('mousemove', e => {
            // Cursor
            const cursor = document.getElementById('cursor');
            cursor.style.transform = `translate3d(${e.clientX}px, ${e.clientY}px, 0) translate(-50%, -50%)`;

            // Cards Tilt
            document.querySelectorAll('.project-card').forEach(card => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                // Update spotlight position
                card.style.setProperty('--mouse-x', `${x}px`);
                card.style.setProperty('--mouse-y', `${y}px`);

                // Calculate tilt
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                const rotateX = (y - centerY) / 15;
                const rotateY = (centerX - x) / 15;

                card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            });
        });

        // Reset tilt on mouse leave
        document.querySelectorAll('.project-card').forEach(card => {
            card.addEventListener('mouseleave', () => {
                card.style.transform = `rotateX(0) rotateY(0)`;
            });
        });

        // Sinking & Parallax
        window.addEventListener('scroll', () => {
            const scrolled = window.scrollY;
            const hero = document.getElementById('hero-content');
            if(scrolled < 1000) {
                hero.style.transform = `translateY(${scrolled * 0.5}px)`;
                hero.style.opacity = 1 - (scrolled / 600);
            }
        });

        // Simple Reveal
        const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => { if(entry.isIntersecting) entry.target.classList.add('active'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

        // Hover states
        document.body.addEventListener('mouseover', e => {
            if(e.target.closest('.interactive')) document.body.classList.add('hovering');
        });
        document.body.addEventListener('mouseout', e => {
            if(e.target.closest('.interactive')) document.body.classList.remove('hovering');
        });

        // Modal
        function openModal(id) {
            const p = projects.find(x => x.id === id);
            document.getElementById('modal-body').innerHTML = `
                <h2 class="p-title" style="font-size: 3rem;">${p.title}</h2>
                <p class="p-desc" style="font-size: 1.2rem; margin-top: 2rem;">${p.long}</p>
                <div style="margin-top: 3rem; background: #050a14; aspect-ratio: 16/9; border-radius: 15px; border: 1px solid #111;"></div>
            `;
            document.getElementById('modal').classList.add('active');
        }
        function closeModal() { document.getElementById('modal').classList.remove('active'); }

        // Particles
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let parts = [];
        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            parts = Array.from({length: 60}, () => ({
                x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                s: Math.random() * 1.5, v: Math.random() * 0.5 + 0.2
            }));
        }
        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "rgba(0, 242, 255, 0.2)";
            parts.forEach(p => {
                p.y -= p.v; if(p.y < 0) p.y = canvas.height;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(draw);
        }
        window.addEventListener('resize', init);
        init(); draw();
    </script>
</body>
</html>
