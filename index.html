<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sketchy Studio | Deep Dive</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap');

        :root {
            --bg: #01050a;
            --accent: #00f2ff;
            --text: #ffffff;
            --text-dim: #8ba2ad;
            --glass: rgba(2, 12, 27, 0.4);
            --glass-border: rgba(255, 255, 255, 0.05);
            --expo: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        
        body, html {
            background: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden; /* Zabrání rozbití šířky na mobilu */
            width: 100%;
            -webkit-font-smoothing: antialiased;
        }

        /* Top lighting effect */
        .cinematic-glow {
            position: absolute; top: -20vh; left: 50%; transform: translateX(-50%);
            width: 150vw; height: 80vh; pointer-events: none; z-index: 0;
            background: radial-gradient(ellipse at top center, rgba(0, 242, 255, 0.1) 0%, rgba(2, 18, 36, 0.2) 40%, transparent 70%);
        }

        /* Subtle Custom Cursor */
        .cursor-dot {
            position: fixed; top: 0; left: 0; width: 4px; height: 4px; 
            background: var(--accent); border-radius: 50%; pointer-events: none; z-index: 9999;
            transform: translate(-50%, -50%); box-shadow: 0 0 8px var(--accent);
            transition: width 0.3s, height 0.3s, background 0.3s;
        }
        .cursor-aura {
            position: fixed; top: 0; left: 0; width: 30px; height: 30px;
            border: 1px solid rgba(0, 242, 255, 0.15); border-radius: 50%; pointer-events: none; z-index: 9998;
            transform: translate(-50%, -50%); transition: 0.1s ease-out;
            background: rgba(0, 242, 255, 0.02);
        }
        .hovering .cursor-dot { width: 8px; height: 8px; background: white; box-shadow: 0 0 15px white; }
        .hovering .cursor-aura { width: 50px; height: 50px; border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); }

        @media (pointer: coarse) {
            * { cursor: auto !important; }
            .cursor-dot, .cursor-aura { display: none !important; }
        }

        /* Atmosphere */
        .texture-overlay {
            position: fixed; inset: 0; z-index: 100; pointer-events: none; opacity: 0.03; mix-blend-mode: overlay;
            background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noise)"/></svg>');
        }
        #water-particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

        /* Navbar */
        nav {
            position: fixed; top: 0; width: 100%; padding: 2rem 5vw; display: flex;
            justify-content: space-between; align-items: center; z-index: 1000;
            transition: all 0.5s var(--expo); border-bottom: 1px solid transparent;
        }
        nav.scrolled { padding: 1rem 5vw; background: rgba(1, 5, 10, 0.8); backdrop-filter: blur(20px); border-bottom-color: var(--glass-border); }
        .nav-logo { font-family: 'Montserrat', sans-serif; font-weight: 900; letter-spacing: 2px; font-size: 1.2rem; color: var(--text); text-decoration: none; }
        .nav-logo span { color: var(--accent); }

        /* Hero */
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; position: relative; z-index: 10; perspective: 1000px; }
        .hero-content { display: flex; flex-direction: column; align-items: center; transform-style: preserve-3d; will-change: transform, opacity, filter; }
        .hero h1 {
            font-family: 'Montserrat', sans-serif; font-size: clamp(3rem, 10vw, 8rem);
            font-weight: 900; line-height: 0.9; margin-bottom: 1.5rem; letter-spacing: -2px;
            background: linear-gradient(180deg, #ffffff 0%, #60798a 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 15px 30px rgba(0, 242, 255, 0.1));
        }
        .hero-subtitle { color: var(--accent); letter-spacing: 6px; font-weight: 700; font-size: clamp(0.7rem, 2vw, 0.9rem); text-transform: uppercase; }

        /* General Section */
        section { padding: 8rem 5vw; position: relative; z-index: 10; width: 100%; }
        .section-header { font-family: 'Montserrat', sans-serif; font-size: clamp(2rem, 5vw, 3rem); margin-bottom: 3rem; font-weight: 900; letter-spacing: -1px; }

        /* HORIZONTAL PROJECTS SLIDER */
        .projects-slider {
            display: flex; gap: 2rem; overflow-x: auto; padding-bottom: 3rem; padding-top: 1rem;
            scroll-behavior: smooth; scroll-snap-type: x mandatory;
            /* Schování scrollbaru */
            scrollbar-width: none; 
            -ms-overflow-style: none;
        }
        .projects-slider::-webkit-scrollbar { display: none; }
        
        .card-wrapper {
            flex: 0 0 400px; /* Pevná šířka karty */
            scroll-snap-align: start;
            perspective: 1000px;
        }
        
        .card {
            background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px;
            padding: 3rem 2.5rem; position: relative; overflow: hidden;
            backdrop-filter: blur(12px); transform-style: preserve-3d;
            transition: transform 0.1s; box-shadow: 0 20px 40px rgba(0,0,0,0.4); height: 100%;
            display: flex; flex-direction: column;
        }

        .card::before {
            content: ""; position: absolute; inset: 0; z-index: 0; opacity: 0; transition: opacity 0.3s;
            background: radial-gradient(600px circle at var(--mouse-x) var(--mouse-y), rgba(0, 242, 255, 0.06), transparent 40%);
        }
        .card:hover::before { opacity: 1; }
        .card-content { position: relative; z-index: 1; transform: translateZ(30px); pointer-events: none; }
        .card-icon { color: var(--accent); margin-bottom: 2rem; filter: drop-shadow(0 0 10px rgba(0,242,255,0.2)); }
        .card h3 { font-family: 'Montserrat', sans-serif; font-size: 1.8rem; margin-bottom: 1rem; color: white; }
        .card p { color: var(--text-dim); line-height: 1.6; font-size: 0.95rem; margin-bottom: 2rem; flex-grow: 1; }
        
        .btn-view {
            align-self: flex-start; background: transparent; border: 1px solid var(--accent);
            color: var(--accent); padding: 0.8rem 1.5rem; border-radius: 8px; font-weight: 600;
            font-size: 0.8rem; letter-spacing: 1px; transition: 0.3s; pointer-events: auto; text-transform: uppercase;
        }
        .card:hover .btn-view { background: var(--accent); color: var(--bg); }

        /* Modal System */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0, 2, 6, 0.9); backdrop-filter: blur(0px);
            z-index: 2000; display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.4s var(--expo), backdrop-filter 0.4s var(--expo);
        }
        .modal-overlay.active { opacity: 1; pointer-events: all; backdrop-filter: blur(15px); }

        .modal-content {
            background: #01050a; border: 1px solid rgba(0, 242, 255, 0.15); width: 95%; max-width: 1000px;
            height: 90vh; max-height: 850px; overflow-y: auto; overflow-x: hidden; border-radius: 20px; padding: 4rem; position: relative;
            transform: translateY(50px) scale(0.95); opacity: 0; transition: all 0.5s var(--expo);
        }
        .modal-overlay.active .modal-content { transform: translateY(0) scale(1); opacity: 1; }
        
        .close-btn {
            position: absolute; top: 1.5rem; right: 1.5rem; background: rgba(255,255,255,0.05); border: none;
            color: white; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.3s; z-index: 10;
        }
        .close-btn:hover { background: var(--accent); color: black; transform: rotate(90deg); }

        /* CMS Framework (Optimized for Mobile) */
        .cms-flow { display: flex; flex-direction: column; gap: 2.5rem; color: var(--text-dim); line-height: 1.8; font-size: 1rem; }
        .align-center { text-align: center; margin: 0 auto; max-width: 800px; }
        .text-gradient { background: linear-gradient(135deg, var(--accent), #ffffff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: inline-block; }
        .title-large { font-family: 'Montserrat', sans-serif; font-size: clamp(2rem, 6vw, 3.5rem); font-weight: 900; color: white; line-height: 1.1; margin-bottom: 0.5rem; letter-spacing: -1px; }
        
        /* Flex Grid that breaks nicely on mobile */
        .flex-grid { display: flex; gap: 3rem; align-items: center; }
        .flex-grid > * { flex: 1; }
        
        .img-placeholder { 
            background: rgba(0, 242, 255, 0.02); border: 1px solid rgba(0,242,255,0.1); border-radius: 12px; width: 100%; 
            display: flex; align-items: center; justify-content: center; color: var(--text-dim); font-size: 0.8rem; letter-spacing: 2px; 
            position: relative; overflow: hidden; text-align: center; padding: 2rem;
        }
        .img-tall { aspect-ratio: 4/5; } .img-wide { aspect-ratio: 16/9; }

        /* Footer (Professional) */
        footer {
            padding: 4rem 5vw; border-top: 1px solid var(--glass-border);
            display: flex; justify-content: space-between; align-items: flex-end;
            position: relative; z-index: 10; background: linear-gradient(to top, rgba(1,5,10,1), transparent);
        }
        .legal p { color: var(--text-dim); font-size: 0.8rem; margin-bottom: 0.5rem; }
        .legal p strong { color: white; font-weight: 600; }
        .socials { display: flex; gap: 1.5rem; }
        .socials a { color: var(--text-dim); transition: 0.3s; }
        .socials a:hover { color: var(--accent); transform: translateY(-3px); }

        /* --- MOBILE OVERRIDES --- */
        @media (max-width: 768px) {
            section { padding: 6rem 5vw; }
            .card-wrapper { flex: 0 0 85vw; } /* Na mobilu karta zabere skoro celou šířku */
            
            .modal-content { padding: 2rem 1.5rem; height: 95vh; border-radius: 12px; }
            
            /* Stacking text and images cleanly on mobile */
            .flex-grid { flex-direction: column; gap: 2rem; }
            .img-tall { aspect-ratio: 16/9; } /* Na mobilu nevypadá vysoká fotka dobře, změníme poměr */
            
            footer { flex-direction: column; align-items: center; text-align: center; gap: 2rem; }
        }
    </style>
</head>
<body>

    <div class="cinematic-glow"></div>
    <div class="cursor-dot" id="cursor-dot"></div>
    <div class="cursor-aura" id="cursor-aura"></div>
    <div class="texture-overlay"></div>
    <canvas id="water-particles"></canvas>

    <nav id="navbar">
        <a href="#" class="nav-logo interactive">SKETCHY<span>STUDIO</span></a>
    </nav>

    <section class="hero">
        <div class="hero-content" id="hero-content">
            <h1 class="interactive">DEEP WORK</h1>
            <p class="hero-subtitle">Engineering the Void</p>
        </div>
    </section>

    <section id="work">
        <h2 class="section-header">SELECTED WORKS</h2>
        <!-- Horizontální slider místo sčítání pod sebou -->
        <div class="projects-slider" id="project-slider">
            <!-- Vygenerováno přes JS -->
        </div>
    </section>

    <!-- Profesionální Footer -->
    <footer>
        <div class="legal">
            <p><strong>© 2026 SKETCHY STUDIO.</strong> Všechna práva vyhrazena.</p>
            <p>IČO: 12345678 (Zde bude doplněno)</p>
            <p>Made with focus.</p>
        </div>
        <div class="socials">
            <a href="#" class="interactive"><i data-lucide="youtube"></i></a>
            <a href="#" class="interactive"><i data-lucide="twitter"></i></a>
            <a href="#" class="interactive"><i data-lucide="github"></i></a>
        </div>
    </footer>

    <div class="modal-overlay" id="modal">
        <div class="modal-content" id="modal-content" onclick="event.stopPropagation()">
            <button class="close-btn interactive" onclick="closeModal()"><i data-lucide="x" size="20"></i></button>
            <div id="modal-body" class="cms-flow"></div>
        </div>
    </div>

    <script>
        // --- PROJEKTOVÁ DATA ---
        const projectData = [
            {
                id: 'eclipse', icon: 'anchor', title: 'Project Eclipse',
                shortDesc: 'Nelineární survival zážitek v hlubinách oceánu. Práce s procedurálním generováním.',
                modalHTML: `
                    <div class="align-center">
                        <h2 class="title-large text-gradient">Project Eclipse</h2>
                        <p style="color: var(--accent); letter-spacing: 2px; font-weight: 700; margin-bottom: 2rem;">DEEP SEA SURVIVAL</p>
                    </div>
                    <div class="img-placeholder img-wide">CINEMATICKÝ TRAILER (16:9)</div>
                    <div class="flex-grid" style="margin-top: 2rem;">
                        <div>
                            <h3 class="text-gradient" style="font-size: 1.5rem; margin-bottom: 1rem;">Procedurální Audio</h3>
                            <p>Systém, který počítá odrazy zvuku pod vodou v reálném čase. Poskytuje hráči orientaci čistě na základě echolokace.</p>
                        </div>
                        <div class="img-placeholder img-tall">UKÁZKA KÓDU / EDITORU</div>
                    </div>
                `
            },
            {
                id: 'kinematics', icon: 'cpu', title: 'Kinematics Engine',
                shortDesc: 'Vlastní framework pro pohyb postav. Realistická setrvačnost a plynulé přechody.',
                modalHTML: `
                    <div class="align-center">
                        <h2 class="title-large text-gradient">Kinematics Engine</h2>
                        <p style="color: var(--text-dim); margin: 1.5rem 0;">Fyzikálně přesný character controller vytvořený od nuly.</p>
                    </div>
                    <div class="flex-grid">
                        <div class="img-placeholder img-tall">DIAGRAM POHYBU</div>
                        <div class="img-placeholder img-tall">STATE MACHINE</div>
                    </div>
                `
            },
            {
                id: 'level-design', icon: 'layers', title: 'Level Design Kit',
                shortDesc: 'Sada nástrojů pro tvorbu atmosférických prostředí. Od nasvícení až po optimalizaci.',
                modalHTML: `
                    <div class="align-center">
                        <h2 class="title-large">Level Design Kit</h2>
                        <p style="margin-top: 1rem;">Nástroje pro rychlejší iteraci a stavbu světů.</p>
                    </div>
                    <div class="img-placeholder img-wide" style="margin-top: 2rem;">UKÁZKA PROSTŘEDÍ</div>
                `
            },
            {
                id: 'ui-system', icon: 'layout', title: 'Holographic UI',
                shortDesc: 'Minimalistický a responzivní uživatelský interface postavený pro VR a PC integraci.',
                modalHTML: `
                    <div class="align-center">
                        <h2 class="title-large text-gradient">Holographic UI</h2>
                        <p style="margin-top: 1rem;">Interface, který nepřekáží, ale komunikuje.</p>
                    </div>
                `
            }
        ];

        // Generování HTML karet
        const slider = document.getElementById('project-slider');
        projectData.forEach(proj => {
            slider.innerHTML += `
                <div class="card-wrapper">
                    <div class="card interactive" onclick="openModal('${proj.id}')">
                        <div class="card-content">
                            <i data-lucide="${proj.icon}" size="40" class="card-icon"></i>
                            <h3>${proj.title}</h3>
                            <p>${proj.shortDesc}</p>
                            <button class="btn-view">Zobrazit detaily</button>
                        </div>
                    </div>
                </div>
            `;
        });
        lucide.createIcons();

        // --- CUSTOM CURSOR ---
        const isTouch = window.matchMedia("(pointer: coarse)").matches;
        if (!isTouch) {
            const dot = document.getElementById('cursor-dot');
            const aura = document.getElementById('cursor-aura');
            let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;
            let auraX = mouseX, auraY = mouseY;

            window.addEventListener('mousemove', (e) => {
                mouseX = e.clientX; mouseY = e.clientY;
                dot.style.left = mouseX + 'px'; dot.style.top = mouseY + 'px';
            });

            function animateAura() {
                auraX += (mouseX - auraX) * 0.2; auraY += (mouseY - auraY) * 0.2;
                aura.style.left = auraX + 'px'; aura.style.top = auraY + 'px';
                requestAnimationFrame(animateAura);
            }
            animateAura();

            // Hover event delegace pro dynamické elementy
            document.body.addEventListener('mouseover', e => {
                if(e.target.closest('.interactive')) document.body.classList.add('hovering');
            });
            document.body.addEventListener('mouseout', e => {
                if(e.target.closest('.interactive')) document.body.classList.remove('hovering');
            });
            
            // 3D Card Hover Effect (Pouze na desktopu pro výkon)
            document.querySelectorAll('.card').forEach(card => {
                card.addEventListener('mousemove', e => {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left; const y = e.clientY - rect.top;
                    card.style.setProperty('--mouse-x', `${x}px`);
                    card.style.setProperty('--mouse-y', `${y}px`);
                    
                    const centerX = rect.width / 2; const centerY = rect.height / 2;
                    const rotateX = ((y - centerY) / centerY) * -5; 
                    const rotateY = ((x - centerX) / centerX) * 5;
                    card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`;
                });
                card.addEventListener('mouseleave', () => {
                    card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
                });
            });
        }

        // --- DRAG TO SCROLL (Myší na desktopu posouvat slider) ---
        let isDown = false; let startX; let scrollLeft;
        slider.addEventListener('mousedown', (e) => {
            isDown = true; slider.style.cursor = 'grabbing';
            startX = e.pageX - slider.offsetLeft; scrollLeft = slider.scrollLeft;
        });
        slider.addEventListener('mouseleave', () => { isDown = false; slider.style.cursor = 'none'; });
        slider.addEventListener('mouseup', () => { isDown = false; slider.style.cursor = 'none'; });
        slider.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            e.preventDefault();
            const x = e.pageX - slider.offsetLeft;
            const walk = (x - startX) * 2; // Rychlost dragu
            slider.scrollLeft = scrollLeft - walk;
        });

        // --- CINEMATIC SCROLL ---
        window.addEventListener('scroll', () => {
            const content = document.getElementById('hero-content');
            const nav = document.getElementById('navbar');
            let scroll = window.scrollY;
            
            if(!isTouch) { // Na mobilu necháme hero statický kvůli výkonu
                content.style.transform = `translate3d(0, ${scroll * 0.5}px, ${scroll * -1}px) rotateX(${scroll * 0.05}deg)`;
                content.style.opacity = Math.max(0, 1 - (scroll / 400));
            }

            if (scroll > 50) nav.classList.add('scrolled');
            else nav.classList.remove('scrolled');
        });

        // --- WATER PARTICLES (Lehce upraveno pro mobilní výkon) ---
        const canvas = document.getElementById('water-particles');
        const ctx = canvas.getContext('2d');
        let particlesArray = [];
        let pMouseX = 0, pMouseY = 0;

        if(!isTouch) window.addEventListener('mousemove', e => { pMouseX = e.clientX; pMouseY = e.clientY; });
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5; this.baseY = Math.random() * -1 - 0.2;
                this.speedY = this.baseY; this.speedX = (Math.random() - 0.5) * 0.3;
                this.opacity = Math.random() * 0.4 + 0.1;
            }
            update() {
                if(!isTouch) {
                    let dx = pMouseX - this.x; let dy = pMouseY - this.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < 100) {
                        this.x -= (dx / distance) * 2; this.y -= (dy / distance) * 2;
                    }
                }
                this.y += this.speedY; this.x += this.speedX;
                if (this.y < -10) { this.y = canvas.height + 10; this.x = Math.random() * canvas.width; }
            }
            draw() {
                ctx.fillStyle = `rgba(0, 242, 255, ${this.opacity})`;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }
        // Méně částic na mobilu pro lepší framerate
        const particleCount = isTouch ? 30 : 60;
        for (let i = 0; i < particleCount; i++) particlesArray.push(new Particle());
        
        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particlesArray.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        // --- MODAL SYSTEM ---
        const modal = document.getElementById('modal');
        const modalBody = document.getElementById('modal-body');

        function openModal(projectId) {
            const project = projectData.find(p => p.id === projectId);
            if(!project) return;
            modalBody.innerHTML = project.modalHTML;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
            document.body.classList.remove('hovering');
            setTimeout(() => modalBody.innerHTML = '', 400);
        }
        modal.addEventListener('click', closeModal);
    </script>
</body>
</html>
