<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sketchy Studio | Archive</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap');

        :root {
            --bg: #010308;
            --hero-top: #0a1120;
            --accent: #00f2ff;
            --text: #ffffff;
            --text-dim: #7a8d9c;
            --expo: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        body, html { 
            background: var(--bg); color: var(--text); 
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden; width: 100%; scroll-behavior: smooth;
        }

        /* Bg & FX */
        #particles-canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
        .noise-overlay { position: fixed; inset: 0; z-index: 100; pointer-events: none; opacity: 0.03; background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3"/></filter><rect width="100%" height="100%" filter="url(%23noise)"/></svg>'); }

        /* Custom Cursor */
        #cursor {
            position: fixed; top: 0; left: 0; width: 8px; height: 8px; 
            background: var(--accent); border-radius: 50%; pointer-events: none; z-index: 9999;
            transform: translate3d(-50%, -50%, 0); transition: width 0.3s var(--expo), height 0.3s var(--expo), background 0.3s var(--expo);
        }
        body.hovering #cursor { width: 55px; height: 55px; background: rgba(0, 242, 255, 0.05); border: 1px solid var(--accent); backdrop-filter: blur(4px); }

        /* Nav */
        nav { position: fixed; top: 0; width: 100%; padding: 2.5rem 5vw; display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .nav-logo { font-family: 'Montserrat', sans-serif; font-weight: 900; letter-spacing: 2px; text-decoration: none; color: white; }
        .nav-logo span { color: var(--accent); }
        .nav-links { display: flex; gap: 3rem; }
        .nav-links a { color: var(--text-dim); text-decoration: none; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 3px; font-weight: 600; transition: 0.3s; }
        .nav-links a:hover { color: white; text-shadow: 0 0 10px var(--accent); }

        /* Hero & Sinking */
        .hero { 
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; 
            position: relative; z-index: 10;
            background: radial-gradient(circle at top, var(--hero-top) 0%, var(--bg) 80%);
        }
        .sinking-layer { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 30%, var(--bg) 90%); pointer-events: none; z-index: 5; }
        #hero-content { text-align: center; z-index: 10; will-change: transform, opacity; }
        .hero h1 { font-family: 'Montserrat', sans-serif; font-size: clamp(3.5rem, 12vw, 9rem); font-weight: 900; letter-spacing: -4px; line-height: 0.85; background: linear-gradient(180deg, #fff 0%, #444 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero-subtitle { color: var(--accent); letter-spacing: 15px; text-transform: uppercase; font-size: 0.75rem; margin-top: 2rem; opacity: 0.8; }

        /* Projects Section */
        #work { padding: 8rem 0; overflow: hidden; position: relative; }
        .section-header { padding: 0 5vw; margin-bottom: 4rem; }

        /* Slider Logic */
        .slider-wrapper { position: relative; width: 100%; padding: 0 5vw; }
        .slider-container { 
            display: flex; gap: 3rem; overflow-x: auto; scrollbar-width: none; 
            padding: 4rem 0; scroll-behavior: smooth;
        }
        .slider-container::-webkit-scrollbar { display: none; }

        /* Arrows */
        .nav-arrow {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 60px; height: 60px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center;
            z-index: 100; transition: 0.3s; opacity: 0;
        }
        .slider-wrapper:hover .nav-arrow { opacity: 1; }
        .nav-arrow:hover { background: var(--accent); color: black; border-color: var(--accent); box-shadow: 0 0 30px rgba(0, 242, 255, 0.4); }
        .arrow-left { left: 2vw; }
        .arrow-right { right: 2vw; }

        /* 3D Project Card */
        .card-perspective { flex: 0 0 450px; perspective: 1000px; }
        .project-card {
            background: rgba(5, 10, 20, 0.6); border: 1px solid rgba(255,255,255,0.03); border-radius: 24px;
            padding: 4rem 3rem; height: 550px; position: relative; overflow: hidden;
            transform-style: preserve-3d; transition: border-color 0.4s var(--expo);
            display: flex; flex-direction: column; justify-content: flex-end;
            backdrop-filter: blur(10px);
        }
        
        /* Spotlight odlesk */
        .project-card::before {
            content: ""; position: absolute; inset: 0;
            background: radial-gradient(800px circle at var(--mouse-x) var(--mouse-y), rgba(0, 242, 255, 0.12), transparent 40%);
            z-index: 0; pointer-events: none;
        }

        .project-card:hover { border-color: rgba(0, 242, 255, 0.4); }
        .card-content { position: relative; z-index: 1; pointer-events: none; transform: translateZ(60px); }
        
        .p-icon { color: var(--accent); margin-bottom: 2.5rem; display: block; filter: drop-shadow(0 0 15px rgba(0,242,255,0.5)); }
        .p-title { font-family: 'Montserrat', sans-serif; font-size: 2.2rem; margin-bottom: 1rem; font-weight: 900; letter-spacing: -1px; }
        .p-desc { color: var(--text-dim); line-height: 1.8; font-size: 1rem; margin-bottom: 2rem; }

        .btn-archive { 
            background: transparent; border: none; color: var(--accent); font-weight: 700; 
            text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem; display: flex; align-items: center; gap: 10px;
        }

        /* Footer */
        footer { padding: 6rem 5vw; display: flex; flex-direction: column; align-items: center; gap: 4rem; }
        .social-links { display: flex; gap: 4rem; }
        .social-link { color: var(--text-dim); text-decoration: none; font-weight: 600; letter-spacing: 2px; font-size: 0.85rem; transition: 0.4s; display: flex; align-items: center; gap: 10px; }
        .social-link:hover { color: var(--accent); text-shadow: 0 0 20px var(--accent); transform: translateY(-5px); }

        @media (max-width: 768px) {
            .nav-links, .nav-arrow { display: none; }
            .card-perspective { flex: 0 0 85vw; }
            .project-card { padding: 3rem 2rem; height: 500px; }
            #cursor { display: none; }
        }
    </style>
</head>
<body>

    <div class="noise-overlay"></div>
    <canvas id="particles-canvas"></canvas>
    <div id="cursor"></div>

    <nav>
        <a href="#" class="nav-logo interactive">SKETCHY<span>STUDIO</span></a>
        <div class="nav-links">
            <a href="#about" class="interactive">Origin</a>
            <a href="#work" class="interactive">Archive</a>
            <a href="#contact" class="interactive">Signal</a>
        </div>
    </nav>

    <div class="hero">
        <div class="sinking-layer"></div>
        <div id="hero-content">
            <h1 class="interactive">VOID<br>ENGINEER</h1>
            <p class="hero-subtitle">Industrial Game Architecture</p>
        </div>
    </div>

    <section id="work">
        <div class="section-header reveal">
            <h2 style="font-family: 'Montserrat'; font-size: 3rem; font-weight: 900; letter-spacing: -2px;">SELECTED_WORKS</h2>
        </div>

        <div class="slider-wrapper">
            <button class="nav-arrow arrow-left interactive" onclick="scrollSlider(-1)"><i data-lucide="chevron-left"></i></button>
            <button class="nav-arrow arrow-right interactive" onclick="scrollSlider(1)"><i data-lucide="chevron-right"></i></button>
            
            <div class="slider-container" id="slider">
                <!-- Projekty se vloží JS -->
            </div>
        </div>
    </section>

    <footer id="contact">
        <div class="social-links">
            <a href="#" class="social-link interactive"><i data-lucide="youtube"></i> YouTube</a>
            <a href="#" class="social-link interactive"><i data-lucide="message-square"></i> Discord</a>
            <a href="#" class="social-link interactive"><i data-lucide="instagram"></i> Instagram</a>
        </div>
    </footer>

    <script>
        const projects = [
            { id: '1', title: 'Deep State', icon: 'zap', desc: 'Atmospheric underwater simulation with procedural ecosystem logic.' },
            { id: '2', title: 'Kinematics', icon: 'cpu', desc: 'Advanced character physics engine for high-fidelity movement.' },
            { id: '3', title: 'Aura UI', icon: 'layers', desc: 'Minimalist interface framework for diegetic game menus.' },
            { id: '4', title: 'Neon Pulse', icon: 'activity', desc: 'Fast-paced rhythm system built for procedural music generation.' }
        ];

        const slider = document.getElementById('slider');

        // Render Cards
        projects.forEach(p => {
            const card = document.createElement('div');
            card.className = 'card-perspective';
            card.innerHTML = `
                <div class="project-card interactive">
                    <div class="card-content">
                        <i data-lucide="${p.icon}" class="p-icon" size="40"></i>
                        <h3 class="p-title">${p.title}</h3>
                        <p class="p-desc">${p.desc}</p>
                        <div class="btn-archive">View Archive <i data-lucide="arrow-right" size="16"></i></div>
                    </div>
                </div>
            `;
            slider.appendChild(card);
        });
        lucide.createIcons();

        // 3D Tilt & Spotlight
        document.addEventListener('mousemove', e => {
            const cursor = document.getElementById('cursor');
            cursor.style.transform = `translate3d(${e.clientX}px, ${e.clientY}px, 0) translate(-50%, -50%)`;

            document.querySelectorAll('.project-card').forEach(card => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                card.style.setProperty('--mouse-x', `${x}px`);
                card.style.setProperty('--mouse-y', `${y}px`);

                // Tilt calculation
                if (x > 0 && x < rect.width && y > 0 && y < rect.height) {
                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;
                    const rotateX = (y - centerY) / 10;
                    const rotateY = (centerX - x) / 10;
                    card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
                } else {
                    card.style.transform = `rotateX(0deg) rotateY(0deg)`;
                }
            });
        });

        // Slider Navigation
        function scrollSlider(dir) {
            const scrollAmount = 500;
            slider.scrollBy({ left: dir * scrollAmount, behavior: 'smooth' });
        }

        // Parallax Sinking
        window.addEventListener('scroll', () => {
            const scrolled = window.scrollY;
            const hero = document.getElementById('hero-content');
            if(scrolled < 800) {
                hero.style.transform = `translateY(${scrolled * 0.45}px)`;
                hero.style.opacity = 1 - (scrolled / 550);
            }
        });

        // Hover Detection
        document.body.addEventListener('mouseover', e => {
            if(e.target.closest('.interactive')) document.body.classList.add('hovering');
        });
        document.body.addEventListener('mouseout', e => {
            if(e.target.closest('.interactive')) document.body.classList.remove('hovering');
        });

        // Reveal Animation
        const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => { if(entry.isIntersecting) entry.target.classList.add('active'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

        // Background Particles
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let parts = [];
        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            parts = Array.from({length: 50}, () => ({
                x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                s: Math.random() * 1.5, v: Math.random() * 0.4 + 0.1
            }));
        }
        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "rgba(0, 242, 255, 0.15)";
            parts.forEach(p => {
                p.y -= p.v; if(p.y < 0) p.y = canvas.height;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(draw);
        }
        window.addEventListener('resize', init);
        init(); draw();
    </script>
</body>
</html>
