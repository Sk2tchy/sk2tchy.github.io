<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sketchy Studio | Independent Dev</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap');

        :root {
            --bg: #010308;
            --accent: #00f2ff;
            --text: #ffffff;
            --text-dim: #7a8d9c;
            --glass: rgba(5, 10, 20, 0.4);
            --glass-border: rgba(255, 255, 255, 0.05);
            --expo: cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Base & Reset */
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        body, html { 
            background: var(--bg); color: var(--text); 
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden; width: 100%;
            -webkit-font-smoothing: antialiased; scroll-behavior: smooth;
        }

        /* Overlays */
        .vignette-overlay { position: fixed; inset: 0; z-index: 50; pointer-events: none; background: radial-gradient(circle at center, transparent 40%, rgba(1, 3, 8, 0.9) 100%); }
        .noise-overlay { position: fixed; inset: 0; z-index: 51; pointer-events: none; opacity: 0.03; mix-blend-mode: overlay; background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noise)"/></svg>'); }
        #particles-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

        /* Cursor */
        #cursor {
            position: fixed; top: 0; left: 0; width: 8px; height: 8px; 
            background: var(--accent); border-radius: 50%; pointer-events: none; z-index: 9999;
            transform: translate3d(-50%, -50%, 0); will-change: transform;
            transition: width 0.3s var(--expo), height 0.3s var(--expo), background 0.3s var(--expo);
            box-shadow: 0 0 15px var(--accent);
        }
        body.hovering #cursor { width: 50px; height: 50px; background: rgba(0, 242, 255, 0.1); border: 1px solid var(--accent); box-shadow: none; }

        @media (pointer: coarse) { * { cursor: auto !important; } #cursor { display: none !important; } }

        /* Nav */
        nav { position: fixed; top: 0; width: 100%; padding: 2.5rem 5vw; display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .nav-logo { font-family: 'Montserrat', sans-serif; font-weight: 900; letter-spacing: 2px; text-decoration: none; color: white; }
        .nav-logo span { color: var(--accent); }

        /* Hero */
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; position: relative; z-index: 10; }
        .hero-content { display: flex; flex-direction: column; align-items: center; will-change: transform, opacity; }
        .hero h1 { font-family: 'Montserrat', sans-serif; font-size: clamp(3.5rem, 12vw, 9rem); font-weight: 900; letter-spacing: -3px; line-height: 0.9; background: linear-gradient(180deg, #ffffff 0%, #3a4b5c 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .scroll-indicator { position: absolute; bottom: 2rem; opacity: 0.5; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .mouse { width: 20px; height: 32px; border: 2px solid white; border-radius: 20px; position: relative; }
        .wheel { width: 2px; height: 6px; background: white; position: absolute; top: 6px; left: 50%; transform: translateX(-50%); animation: scrollMouse 2s infinite; }
        @keyframes scrollMouse { 0% { opacity: 1; transform: translateX(-50%) translateY(0); } 100% { opacity: 0; transform: translateX(-50%) translateY(15px); } }

        /* Stats (Modernized) */
        .stats-container { display: flex; gap: 4rem; margin-top: 3rem; }
        .stat-item { border-left: 1px solid rgba(0, 242, 255, 0.3); padding-left: 1.5rem; text-align: left; }
        .stat-item h4 { font-family: 'Montserrat'; font-size: 1.5rem; color: var(--accent); }
        .stat-item p { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-dim); }

        /* Projects Section */
        section { padding: 8rem 5vw; width: 100%; position: relative; z-index: 60; }
        .section-title { font-family: 'Montserrat', sans-serif; font-size: clamp(2rem, 5vw, 3rem); font-weight: 900; letter-spacing: -1px; margin-bottom: 4rem; }

        .slider-container { display: flex; gap: 2rem; overflow-x: auto; padding: 2rem 0 4rem; scrollbar-width: none; perspective: 1200px; scroll-behavior: smooth; }
        .slider-container::-webkit-scrollbar { display: none; }

        .card-wrapper { flex: 0 0 420px; transform-style: preserve-3d; }
        .card {
            background: #02050a; border: 1px solid rgba(255,255,255,0.05); border-radius: 16px;
            padding: 3rem; display: flex; flex-direction: column; height: 100%;
            position: relative; overflow: hidden; transition: 0.3s var(--expo);
            transform: rotateX(var(--rotX, 0deg)) rotateY(var(--rotY, 0deg)) scale(var(--scale, 1));
        }
        .card:hover { border-color: var(--accent); --scale: 1.02; }
        .card-glow { position: absolute; inset: 0; background: radial-gradient(circle at var(--mouseX) var(--mouseY), rgba(0, 242, 255, 0.1), transparent 50%); opacity: 0; transition: opacity 0.4s; pointer-events: none; }
        .card:hover .card-glow { opacity: 1; }
        .card-content { pointer-events: none; }
        .card h3 { font-family: 'Montserrat'; font-size: 1.8rem; margin: 1.5rem 0 1rem; }
        .card p { color: var(--text-dim); font-size: 1rem; line-height: 1.7; }

        /* Slider Controls */
        .slider-arrows { display: flex; gap: 1rem; margin-top: -2rem; margin-bottom: 4rem; justify-content: flex-end; }
        .arrow { width: 50px; height: 50px; border: 1px solid rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .arrow:hover { background: white; color: black; border-color: white; }

        /* Footer & Socials */
        footer { padding: 6rem 5vw; border-top: 1px solid var(--glass-border); display: flex; flex-direction: column; align-items: center; gap: 3rem; background: var(--bg); position: relative; z-index: 60; }
        .social-links { display: flex; gap: 4rem; }
        .social-link { 
            color: var(--text-dim); text-decoration: none; display: flex; align-items: center; gap: 12px;
            font-weight: 600; text-transform: uppercase; letter-spacing: 2px; font-size: 0.9rem; transition: 0.4s;
        }
        .social-link:hover { color: var(--accent); text-shadow: 0 0 15px var(--accent); transform: translateY(-5px); }

        /* Modal (Rozkliknutí) */
        .modal { position: fixed; inset: 0; z-index: 10000; background: rgba(1,3,8,0.98); display: none; align-items: center; justify-content: center; padding: 2rem; }
        .modal-content { max-width: 800px; width: 100%; color: white; }
        .close-modal { position: absolute; top: 2rem; right: 2rem; color: white; border: none; background: none; font-size: 1rem; letter-spacing: 2px; }

        @media (max-width: 768px) {
            .stats-container { flex-direction: column; gap: 2rem; }
            .card-wrapper { flex: 0 0 85vw; }
            .social-links { flex-direction: column; gap: 2rem; align-items: center; }
        }
    </style>
</head>
<body>

    <div class="vignette-overlay"></div>
    <div class="noise-overlay"></div>
    <canvas id="particles-canvas"></canvas>
    <div id="cursor"></div>

    <nav>
        <a href="#" class="nav-logo interactive">SKETCHY<span>STUDIO</span></a>
    </nav>

    <div class="hero">
        <div class="hero-content" id="hero-content">
            <h1 class="interactive">ENGINEERING<br>THE VOID</h1>
            <div class="stats-container">
                <div class="stat-item"><h4>6+</h4><p>Years in Dev</p></div>
                <div class="stat-item"><h4>12</h4><p>Projects</p></div>
                <div class="stat-item"><h4>C# / UE5</h4><p>Main Stack</p></div>
            </div>
        </div>
        <div class="scroll-indicator">
            <div class="mouse"><div class="wheel"></div></div>
            <p style="font-size: 0.6rem; letter-spacing: 2px; margin-top: 10px;">SCROLL DOWN</p>
        </div>
    </div>

    <section id="projects">
        <h2 class="section-title">SELECTED WORKS</h2>
        <div class="slider-container" id="slider"></div>
        <div class="slider-arrows">
            <div class="arrow interactive" onclick="moveSlider(-1)"><i data-lucide="chevron-left"></i></div>
            <div class="arrow interactive" onclick="moveSlider(1)"><i data-lucide="chevron-right"></i></div>
        </div>
    </section>

    <footer>
        <div class="social-links">
            <a href="#" class="social-link interactive"><i data-lucide="youtube"></i> YouTube</a>
            <a href="#" class="social-link interactive"><i data-lucide="message-square"></i> Discord</a>
            <a href="#" class="social-link interactive"><i data-lucide="instagram"></i> Instagram</a>
        </div>
        <p style="color: #1a1d23; font-size: 0.7rem; margin-top: 2rem;">© 2026 SKETCHY STUDIO. SYSTEM ONLINE.</p>
    </footer>

    <div class="modal" id="modal">
        <button class="close-modal interactive" onclick="closeModal()">CLOSE / ESC</button>
        <div class="modal-content" id="modal-content"></div>
    </div>

    <script>
        const projects = [
            { id: 'eclipse', title: 'Project Eclipse', icon: 'anchor', desc: 'A non-linear survival experience set in the crushing depths of the ocean. Focused heavily on dynamic audio propagation.' },
            { id: 'kinematics', title: 'Kinematics Engine', icon: 'cpu', desc: 'A custom character controller framework prioritizing realistic inertia and fluid state transitions.' },
            { id: 'neon', title: 'Neon District', icon: 'layers', desc: 'Procedural city generation algorithm optimized for dense, cyberpunk-styled vertical environments.' }
        ];

        const slider = document.getElementById('slider');
        projects.forEach(p => {
            slider.innerHTML += `
                <div class="card-wrapper">
                    <div class="card interactive" onclick="openProject('${p.id}')">
                        <div class="card-glow"></div>
                        <div class="card-content">
                            <i data-lucide="${p.icon}" size="40" color="#00f2ff"></i>
                            <h3>${p.title}</h3>
                            <p>${p.desc}</p>
                        </div>
                    </div>
                </div>
            `;
        });
        lucide.createIcons();

        // 3D Tilt + Mouse Glow
        const isTouch = window.matchMedia("(pointer: coarse)").matches;
        if (!isTouch) {
            document.querySelectorAll('.card').forEach(card => {
                card.addEventListener('mousemove', e => {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    card.style.setProperty('--mouseX', `${x}px`);
                    card.style.setProperty('--mouseY', `${y}px`);
                    const rotateX = ((y - rect.height / 2) / (rect.height / 2)) * -10;
                    const rotateY = ((x - rect.width / 2) / (rect.width / 2)) * 10;
                    card.style.setProperty('--rotX', `${rotateX}deg`);
                    card.style.setProperty('--rotY', `${rotateY}deg`);
                });
                card.addEventListener('mouseleave', () => {
                    card.style.setProperty('--rotX', `0deg`);
                    card.style.setProperty('--rotY', `0deg`);
                });
            });
        }

        // Parallax Sinking
        window.addEventListener('scroll', () => {
            const y = window.scrollY;
            const hero = document.getElementById('hero-content');
            hero.style.transform = `translateY(${y * 0.4}px)`;
            hero.style.opacity = Math.max(1 - (y / 500), 0);
        });

        // Slider Navigation
        function moveSlider(dir) {
            slider.scrollBy({ left: dir * 440, behavior: 'smooth' });
        }

        // Modal Logic
        function openProject(id) {
            const p = projects.find(x => x.id === id);
            const modal = document.getElementById('modal');
            document.getElementById('modal-content').innerHTML = `
                <h1 style="font-family:'Montserrat'; font-size: 3rem; color:var(--accent);">${p.title}</h1>
                <p style="margin-top:2rem; font-size: 1.2rem; line-height: 1.8;">${p.desc}</p>
                <div style="margin-top:3rem; border: 1px solid rgba(255,255,255,0.1); padding: 2rem; border-radius: 12px;">
                    <p style="color:var(--text-dim)">Archive Content / Technical Breakdown / Media Gallery</p>
                </div>
            `;
            modal.style.display = 'flex';
        }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        // Cursor
        if (!isTouch) {
            const cursor = document.getElementById('cursor');
            document.addEventListener('mousemove', (e) => {
                cursor.style.transform = `translate3d(${e.clientX}px, ${e.clientY}px, 0) translate(-50%, -50%)`;
            });
            document.body.addEventListener('mouseover', e => {
                if(e.target.closest('.interactive')) document.body.classList.add('hovering');
            });
            document.body.addEventListener('mouseout', e => {
                if(e.target.closest('.interactive')) document.body.classList.remove('hovering');
            });
        }

        // Particles
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5; this.speedY = Math.random() * -0.3;
                this.opacity = Math.random() * 0.3;
            }
            update() { this.y += this.speedY; if (this.y < 0) this.y = canvas.height; }
            draw() { ctx.fillStyle = `rgba(0, 242, 255, ${this.opacity})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
        }
        for(let i=0; i<60; i++) particles.push(new Particle());
        function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
        animate();
    </script>
</body>
</html>
