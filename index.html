<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sketchy | Dev Hub</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');

        :root {
            /* Víc deep a moderní barvy */
            --bg: #070709;
            --surface: rgba(25, 25, 30, 0.4);
            --surface-glass: rgba(18, 18, 24, 0.65);
            --accent-g: linear-gradient(135deg, #ff3366 0%, #7c3aed 100%);
            --red: #ff3366;
            --purple: #7c3aed;
            --text-main: #f8f8f8;
            --text-muted: #8a8a93;
            --border: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(124, 58, 237, 0.5);
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--purple); }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { 
            background-color: var(--bg); 
            color: var(--text-main); 
            overflow-x: hidden; 
            -webkit-font-smoothing: antialiased; 
        }
        
        /* Původní textura s lehkým blendem */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: overlay;
        }

        .g-text { 
            background: var(--accent-g); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            font-weight: 900; 
        }
        .hidden { display: none !important; }
        .label { font-size: 0.75rem; font-weight: 700; color: var(--purple); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }

        /* Animations */
        @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate { animation: fadeUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; opacity: 0; }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }

        /* Overlay */
        #menu-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
            z-index: 1000; opacity: 0; pointer-events: none; transition: 0.4s;
        }
        #menu-overlay.active { opacity: 1; pointer-events: all; }

        #mt-btn { 
            position: fixed; top: 20px; left: 20px; z-index: 1002; background: var(--surface-glass); 
            backdrop-filter: blur(15px); border: 1px solid var(--border); padding: 12px; 
            border-radius: 50%; cursor: pointer; color: white; transition: 0.3s; 
        }
        #mt-btn:hover { border-color: var(--purple); transform: scale(1.1); box-shadow: 0 0 20px rgba(124, 58, 237, 0.3); }
        
        .edge-detector { position: fixed; left: 0; top: 0; width: 15px; height: 100vh; z-index: 999; }

        /* Zaoblený smooth Sidebar */
        .sidebar { 
            position: fixed; left: -340px; top: 0; height: 100vh; width: 320px; 
            background: linear-gradient(180deg, rgba(15, 15, 18, 0.75) 0%, rgba(5, 5, 8, 0.98) 100%);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); z-index: 1001; 
            padding: 5rem 2rem 2rem; transition: 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); 
            border-right: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 0 40px 40px 0;
            display: flex; flex-direction: column; 
            box-shadow: inset -1px 0 20px rgba(124, 58, 237, 0.05);
        }
        .sidebar.open { left: 0; box-shadow: 20px 0 50px rgba(0,0,0,0.8); }
        
        .nav-item { 
            padding: 14px 20px; font-weight: 700; color: var(--text-muted); 
            cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; 
            gap: 12px; border-radius: 20px; margin-bottom: 8px; position: relative;
        }
        .nav-item::before {
            content: ''; position: absolute; left: 6px; top: 50%; transform: translateY(-50%);
            height: 0%; width: 4px; background: var(--accent-g); border-radius: 10px; transition: 0.3s;
        }
        .nav-item:hover, .nav-item.active { 
            color: #fff; background: rgba(255,255,255,0.06); transform: translateX(8px); 
        }
        .nav-item.active::before { height: 60%; }

        /* Moderní Music Player */
        .music-player { 
            background: linear-gradient(145deg, rgba(30,30,40,0.4), rgba(10,10,15,0.7)); 
            padding: 20px; border-radius: 30px; 
            border: 1px solid var(--border); margin-top: auto; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
            position: relative; overflow: hidden;
        }
        .music-player.playing::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(124, 58, 237, 0.15) 0%, transparent 60%);
            animation: pulseBg 4s infinite alternate; pointer-events: none; z-index: 0;
        }
        @keyframes pulseBg { 0% { opacity: 0.4; } 100% { opacity: 1; } }
        
        .m-header, .m-title-wrap, .p-controls, .p-progress { position: relative; z-index: 1; }
        .m-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .m-select { 
            background: rgba(0,0,0,0.4); border: 1px solid var(--border); color: var(--text-muted); 
            font-size: 0.75rem; padding: 6px 10px; border-radius: 12px; outline: none; cursor: pointer; font-weight: 700; transition: 0.2s;
        }
        .m-select:hover { color: white; border-color: var(--purple); }
        .m-select option { background: #111; color: white; }
        .p-controls { display: flex; justify-content: space-between; align-items: center; margin: 15px 0 10px; padding: 0 10px; }
        .p-icon { cursor: pointer; color: var(--text-muted); transition: all 0.2s; }
        .p-icon:hover { color: white; transform: scale(1.15); filter: drop-shadow(0 0 10px rgba(124, 58, 237, 0.8)); }
        
        .p-progress { width: 100%; height: 6px; background: rgba(0,0,0,0.6); border-radius: 10px; cursor: pointer; position: relative; overflow: hidden; }
        .p-bar { height: 100%; background: var(--accent-g); width: 0%; box-shadow: 0 0 12px var(--purple); transition: width 0.1s linear; border-radius: 10px; }

        /* Main Layout */
        .main { max-width: 1000px; margin: 0 auto; padding: 6rem 1.5rem; min-height: 100vh; }

        /* Zaoblené UI Elements */
        .btn { 
            padding: 14px 28px; border-radius: 100px; font-weight: 700; cursor: pointer; 
            transition: 0.3s; border: none; display: inline-flex; align-items: center; gap: 8px; 
        }
        .btn-primary { background: var(--accent-g); color: white; }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(124, 58, 237, 0.35); }
        .btn-secondary { background: var(--surface); color: white; border: 1px solid var(--border); }
        .btn-secondary:hover { background: rgba(255,255,255,0.08); border-color: var(--purple); }

        .bento-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .bento { background: var(--surface-glass); padding: 30px; border-radius: 35px; border: 1px solid var(--border); transition: 0.3s; box-shadow: 0 10px 30px rgba(0,0,0,0.2); backdrop-filter: blur(10px); }
        .bento:hover { border-color: var(--border-hover); transform: translateY(-5px); }

        /* Projects Detail */
        .p-window { 
            width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 35px; 
            border: 1px solid var(--border); overflow: hidden; position: relative; margin-bottom: 30px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .p-window img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; transition: 0.5s; }
        .p-window:hover img { opacity: 0.8; transform: scale(1.02); }
        
        .dynamic-block { margin-bottom: 20px; width: 100%; display: flex; flex-direction: column; }
        .dynamic-block img { max-width: 100%; border: 1px solid var(--border); border-radius: 20px; }

        /* Changelog */
        .ch-box { 
            padding: 25px; background: var(--surface-glass); border-radius: 25px; 
            border: 1px solid var(--border); border-left: 5px solid var(--purple); 
            margin-bottom: 20px; transition: 0.3s; backdrop-filter: blur(10px);
        }
        .ch-box:hover { transform: translateX(8px); background: rgba(255,255,255,0.05); border-left-color: var(--red); }

        /* Index Popup */
        #index-popup { 
            position: fixed; inset: 0; background: rgba(5,5,8,0.98); z-index: 2000; 
            display: none; padding: 5vw; overflow-y: auto; backdrop-filter: blur(20px);
        }
        .idx-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .idx-card { 
            height: 200px; border-radius: 25px; border: 1px solid var(--border); 
            position: relative; overflow: hidden; cursor: pointer; background: #000; 
        }
        .idx-card img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.4; transition: 0.5s; }
        .idx-card:hover img { opacity: 0.7; transform: scale(1.1); }
        .idx-card-content { position: relative; z-index: 2; padding: 25px; height: 100%; display: flex; flex-direction: column; justify-content: flex-end; }
        .idx-search { 
            width: 100%; background: var(--surface); border: 1px solid var(--border); 
            padding: 18px 25px; border-radius: 100px; color: white; outline: none; margin-bottom: 40px; 
            font-size: 1.1rem; transition: 0.3s;
        }
        .idx-search:focus { border-color: var(--purple); background: rgba(255,255,255,0.05); }

        @media (max-width: 768px) {
            .sidebar { width: 300px; left: -320px; }
            .main { padding: 5rem 1rem; }
        }
    </style>
</head>
<body>

    <div class="edge-detector" id="edge-detect"></div>
    <div id="menu-overlay" onclick="toggleSidebar(false)"></div>
    <div id="mt-btn" onclick="toggleSidebar(true)"><i data-lucide="menu"></i></div>

    <nav class="sidebar" id="sidebar">
        <h2 class="g-text" style="font-size: 2.2rem; margin-bottom: 2rem;">Sketchy.</h2>
        <div class="nav-item active" onclick="nav('home')"><i data-lucide="terminal"></i> Dashboard</div>
        <div class="nav-item" onclick="nav('projects')"><i data-lucide="folder-code"></i> Projekty</div>
        <div class="nav-item" onclick="nav('changelog')"><i data-lucide="git-commit"></i> Changelog</div>

        <div class="music-player" id="m-container">
            <div class="m-header">
                <span class="label" style="margin:0;">Now Playing</span>
                <select class="m-select" id="m-category" onchange="changeSong()">
                    <option value="phonk">Phonk Drift</option>
                    <option value="chill">Chillhop Dev</option>
                    <option value="synth">Midnight Synth</option>
                </select>
            </div>
            <div class="m-title-wrap" style="font-weight: 900; font-size: 1.1rem; letter-spacing: -0.5px;" id="m-title">Načítám...</div>
            <div class="p-controls">
                <i data-lucide="skip-back" class="p-icon" size="20" onclick="changeSong()"></i>
                <i data-lucide="play" class="p-icon" id="m-playbtn" onclick="toggleMusic()" size="28" style="color: white;"></i>
                <i data-lucide="skip-forward" class="p-icon" size="20" onclick="changeSong()"></i>
            </div>
            <div class="p-progress" id="m-progress-container" onclick="seekMusic(event)"><div class="p-bar" id="m-bar"></div></div>
            <audio id="audio-player"></audio>
        </div>
    </nav>

    <div id="index-popup">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h1 class="g-text" style="font-size: 2.5rem;">Databáze</h1>
            <button class="btn btn-secondary" onclick="document.getElementById('index-popup').style.display='none'">Zavřít</button>
        </div>
        <input type="text" class="idx-search" id="idxSearch" placeholder="Vyhledat projekt..." oninput="renderIndex()">
        <div id="idx-content" class="idx-grid"></div>
    </div>

    <main class="main">
        
        <section id="home">
            <div class="animate" style="margin-bottom: 4rem;">
                <div class="label">System online</div>
                <h1 style="font-size: clamp(3rem, 7vw, 4.5rem); font-weight: 900; line-height: 1.1; margin-bottom: 1.5rem; letter-spacing: -1px;">
                    Code. <span class="g-text">Create.</span><br>Repeat.
                </h1>
                <p style="color: var(--text-muted); max-width: 500px; margin-bottom: 2rem; font-size: 1.1rem;">
                    Roblox dev, AI explorer. Čistý UI, funkční kód.
                </p>
                <button class="btn btn-primary" onclick="nav('projects')">Otevřít Archiv</button>
            </div>

            <div class="bento-grid animate delay-1">
                <div class="bento">
                    <div class="label">Status</div>
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <div style="width: 10px; height: 10px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 15px #22c55e;"></div>
                        <strong style="font-size: 1.2rem;">Working on UNI</strong>
                    </div>
                </div>
                <div class="bento">
                    <div class="label">Local Time</div>
                    <div id="clock" style="font-size: 1.8rem; font-weight: 900; letter-spacing: -1px;">00:00</div>
                </div>
            </div>
        </section>

        <section id="projects" class="hidden">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <h1 class="g-text" style="font-size: 3rem; letter-spacing: -1px;">Inspekce</h1>
                <button class="btn btn-secondary" onclick="document.getElementById('index-popup').style.display='block'; renderIndex();"><i data-lucide="grid" size="18"></i> Všechny</button>
            </div>
            
            <div class="p-window animate">
                <img id="p-main-img" src="">
            </div>
            <div id="p-content" class="animate delay-1"></div>
        </section>

        <section id="changelog" class="hidden">
            <h1 class="g-text animate" style="font-size: 3rem; margin-bottom: 3rem; letter-spacing: -1px;">Commits</h1>
            <div id="ch-list" class="animate delay-1"></div>
        </section>

    </main>

    <script>
        // Původní data jsou zpět
        const projects = [
            { 
                name: "UNI - AI Assistant", cat: "AI", 
                img: "https://images.unsplash.com/photo-1620712943543-bcc4688e7485?w=1000&q=80", 
                content: [
                    { type: 'text', val: 'UNI Core System', size: '3.5rem', bold: true, align: 'center', gradient: 'var(--accent-g)', neon: true },
                    { type: 'text', val: 'Základní popis asistence inspirované Jarvisem.', size: '1.2rem', color: 'var(--text-muted)', align: 'center' },
                    { type: 'image', src: 'https://images.unsplash.com/photo-1555066931-4365d14bab8c?w=800&q=80', width: '80%', align: 'center', radius: '25px' }
                ] 
            },
            { 
                name: "Roblox FPS Framework", cat: "Roblox", 
                img: "https://images.unsplash.com/photo-1552820728-8b83bb6b773f?w=1000&q=80", 
                content: [
                    { type: 'text', val: 'Next-Gen Movement', size: '2.5rem', bold: true, align: 'left', color: '#fff' },
                    { type: 'text', val: 'Custom framework pro zbraně a pohyb hráče v Roblox Studiu.', size: '1.1rem', color: '#aaa', align: 'left' }
                ] 
            }
        ];

        const changelogData = [
            { ver: "v1.1 - UI Overhaul", date: "Feb 26, 2026", note: "Opraven sidebar logic, vrácena customizace bloků, funkční audio přehrávač." },
            { ver: "v1.0 - Initial", date: "Feb 06, 2026", note: "První commit portfolia." }
        ];

        // --- SIDEBAR LOGIC ---
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('menu-overlay');
        
        function toggleSidebar(state) {
            if(state) {
                sidebar.classList.add('open');
                overlay.classList.add('active');
            } else {
                sidebar.classList.remove('open');
                overlay.classList.remove('active');
            }
        }

        document.getElementById('edge-detect').addEventListener('mouseenter', () => toggleSidebar(true));
        sidebar.addEventListener('mouseleave', () => toggleSidebar(false));

        let touchStartX = 0;
        document.addEventListener('touchstart', e => touchStartX = e.touches[0].clientX);
        document.addEventListener('touchmove', e => {
            let touchEndX = e.touches[0].clientX;
            if (touchStartX - touchEndX > 50 && sidebar.classList.contains('open')) toggleSidebar(false);
            if (touchEndX - touchStartX > 50 && touchStartX < 30 && !sidebar.classList.contains('open')) toggleSidebar(true);
        });

        // --- NAVIGACE ---
        function nav(id) {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            event.currentTarget.classList.add('active');
            toggleSidebar(false);
            window.scrollTo(0,0);
            if(id === 'projects') loadProject(0);
        }

        // --- PROJEKTY RENDER ---
        function loadProject(idx) {
            const p = projects[idx];
            document.getElementById('p-main-img').src = p.img;
            
            const container = document.getElementById('p-content');
            container.innerHTML = '';

            p.content.forEach(c => {
                const wrapper = document.createElement('div');
                wrapper.className = 'dynamic-block';
                if(c.align === 'center') wrapper.style.alignItems = 'center';
                else if(c.align === 'right') wrapper.style.alignItems = 'flex-end';
                else wrapper.style.alignItems = 'flex-start';

                if(c.type === 'text') {
                    const el = document.createElement('div');
                    el.innerText = c.val;
                    el.style.fontSize = c.size || '1rem';
                    el.style.fontWeight = c.bold ? '900' : '500';
                    el.style.textAlign = c.align || 'left';
                    el.style.letterSpacing = '-0.5px';
                    
                    if(c.gradient) {
                        el.style.background = c.gradient;
                        el.style.webkitBackgroundClip = 'text';
                        el.style.webkitTextFillColor = 'transparent';
                    } else if(c.color) {
                        el.style.color = c.color;
                    }
                    if(c.neon) el.style.textShadow = `0 0 20px var(--purple)`;
                    
                    wrapper.appendChild(el);
                } 
                else if(c.type === 'image') {
                    const img = document.createElement('img');
                    img.src = c.src;
                    img.style.width = c.width || '100%';
                    img.style.borderRadius = c.radius || '20px';
                    wrapper.appendChild(img);
                }
                container.appendChild(wrapper);
            });
            
            document.getElementById('index-popup').style.display = 'none';
        }

        // --- INDEX ARCHIV ---
        function renderIndex() {
            const q = document.getElementById('idxSearch').value.toLowerCase();
            const grid = document.getElementById('idx-content');
            grid.innerHTML = '';
            
            projects.forEach((p, i) => {
                if(p.name.toLowerCase().includes(q) || p.cat.toLowerCase().includes(q)) {
                    grid.innerHTML += `
                        <div class="idx-card" onclick="nav('projects'); loadProject(${i});">
                            <img src="${p.img}">
                            <div class="idx-card-content">
                                <div class="label">${p.cat}</div>
                                <div style="font-weight:900; font-size:1.4rem; letter-spacing: -0.5px;">${p.name}</div>
                            </div>
                        </div>`;
                }
            });
        }

        // --- REAL MUSIC PLAYER ---
        const audio = document.getElementById('audio-player');
        const mContainer = document.getElementById('m-container');
        const progressBar = document.getElementById('m-bar');
        let isPlaying = false; 

        // Tady si pak můžeš napojit svoje MP3 ze složky
        const songsData = { 
            phonk: { title: "Drift in Tokyo", url: "https://cdn.pixabay.com/download/audio/2022/03/15/audio_27c38f1211.mp3" }, 
            chill: { title: "Midnight Lo-Fi", url: "https://cdn.pixabay.com/download/audio/2022/05/27/audio_1808fbf589.mp3" }, 
            synth: { title: "Cyber City", url: "https://cdn.pixabay.com/download/audio/2022/10/14/audio_9939f79026.mp3" } 
        };
        
        audio.src = songsData['phonk'].url;
        document.getElementById('m-title').innerText = songsData['phonk'].title;

        function toggleMusic() {
            if (audio.paused) {
                audio.play();
                isPlaying = true;
                mContainer.classList.add('playing');
            } else {
                audio.pause();
                isPlaying = false;
                mContainer.classList.remove('playing');
            }
            document.getElementById('m-playbtn').setAttribute('data-lucide', isPlaying ? 'pause' : 'play');
            lucide.createIcons();
        }

        function changeSong() {
            const cat = document.getElementById('m-category').value;
            document.getElementById('m-title').innerText = songsData[cat].title;
            audio.src = songsData[cat].url;
            if (isPlaying) {
                audio.play();
            } else {
                toggleMusic();
            }
        }

        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                const progressPercent = (audio.currentTime / audio.duration) * 100;
                progressBar.style.width = progressPercent + '%';
            }
        });

        function seekMusic(e) {
            const container = document.getElementById('m-progress-container');
            const clickX = e.offsetX;
            const width = container.clientWidth;
            const duration = audio.duration;
            audio.currentTime = (clickX / width) * duration;
        }
        
        audio.addEventListener('ended', changeSong);

        // --- UTILS ---
        setInterval(() => { 
            const d = new Date();
            document.getElementById('clock').innerText = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0'); 
        }, 1000);

        changelogData.forEach(ch => {
            document.getElementById('ch-list').innerHTML += `
                <div class="ch-box">
                    <div class="label">${ch.date}</div>
                    <div style="font-size: 1.4rem; font-weight: 900; margin-bottom: 8px; letter-spacing: -0.5px;">${ch.ver}</div>
                    <div style="color: var(--text-muted); font-size: 1rem; line-height: 1.5;">${ch.note}</div>
                </div>`;
        });

        lucide.createIcons();
    </script>
</body>
</html>
