<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sketchy Studio | Dev Portfolio</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap');

        :root {
            --bg: #010308;
            --accent: #00f2ff;
            --text-dim: #7a8d9c;
            --expo: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        body { 
            background: var(--bg); color: white; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden; line-height: 1.6;
        }

        /* Overlays */
        .vignette { position: fixed; inset: 0; z-index: 50; pointer-events: none; background: radial-gradient(circle, transparent 30%, rgba(1,3,8,0.9) 100%); }
        .fog-overlay { position: fixed; inset: 0; z-index: 45; pointer-events: none; background: linear-gradient(to bottom, transparent, rgba(0,242,255,0.02)); opacity: 0; transition: 1s var(--expo); }
        #particles { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

        /* Cursor */
        #cursor {
            position: fixed; top: 0; left: 0; width: 8px; height: 8px; background: var(--accent);
            border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%, -50%);
            transition: width 0.3s var(--expo), height 0.3s var(--expo), background 0.3s var(--expo);
            box-shadow: 0 0 15px var(--accent);
        }
        body.hovering #cursor { width: 50px; height: 50px; background: rgba(0, 242, 255, 0.1); border: 1px solid var(--accent); box-shadow: none; }

        /* Navigation */
        nav { position: fixed; top: 0; width: 100%; padding: 2rem 5vw; display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .logo { font-family: 'Montserrat'; font-size: 1.2rem; letter-spacing: 4px; text-decoration: none; color: white; }
        .logo span { color: var(--accent); }

        /* Hero */
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .hero-content { will-change: transform, opacity; }
        .hero h1 { font-family: 'Montserrat'; font-size: clamp(3rem, 10vw, 8rem); line-height: 0.85; letter-spacing: -4px; margin-bottom: 2rem; }
        
        .scroll-indicator {
            position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center; gap: 10px; opacity: 0.6;
        }
        .mouse { width: 22px; height: 35px; border: 2px solid white; border-radius: 20px; position: relative; }
        .wheel { width: 2px; height: 6px; background: white; position: absolute; top: 6px; left: 50%; transform: translateX(-50%); animation: scroll 2s infinite; }
        @keyframes scroll { 0% { opacity: 1; transform: translateX(-50%) translateY(0); } 100% { opacity: 0; transform: translateX(-50%) translateY(15px); } }

        /* Stats Section */
        .stats-row { display: flex; gap: 3rem; margin-top: 2rem; }
        .stat-item { border-left: 1px solid rgba(255,255,255,0.1); padding-left: 1.5rem; }
        .stat-item h4 { font-family: 'Montserrat'; font-size: 1.5rem; color: var(--accent); }
        .stat-item p { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-dim); }

        /* Projects */
        section { padding: 8rem 5vw; position: relative; z-index: 60; }
        .section-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 4rem; }
        
        .slider-wrapper { position: relative; width: 100%; }
        .slider-container { display: flex; gap: 2rem; overflow-x: auto; padding: 2rem 0; scrollbar-width: none; scroll-behavior: smooth; }
        .slider-container::-webkit-scrollbar { display: none; }

        .card {
            flex: 0 0 400px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 15px; padding: 3rem; position: relative; overflow: hidden;
            transition: border-color 0.4s, transform 0.2s var(--expo); transform-style: preserve-3d;
        }
        .card:hover { border-color: var(--accent); }
        .card-glow { position: absolute; inset: 0; background: radial-gradient(circle at var(--mx) var(--my), rgba(0,242,255,0.1), transparent 50%); opacity: 0; transition: opacity 0.3s; }
        .card:hover .card-glow { opacity: 1; }
        
        .card-content { pointer-events: none; }
        .card h3 { font-family: 'Montserrat'; font-size: 1.5rem; margin: 1.5rem 0 1rem; }
        .card p { color: var(--text-dim); font-size: 0.9rem; }

        /* Arrows lower */
        .slider-arrows { display: flex; gap: 1rem; margin-top: 2rem; justify-content: flex-end; }
        .arrow { width: 45px; height: 45px; border: 1px solid rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .arrow:hover { background: white; color: black; }

        /* Footer / Socials */
        footer { padding: 6rem 5vw; display: flex; flex-direction: column; align-items: center; gap: 3rem; border-top: 1px solid rgba(255,255,255,0.05); }
        .social-row { display: flex; gap: 3rem; }
        .social-link { color: var(--text-dim); text-decoration: none; display: flex; align-items: center; gap: 10px; font-size: 0.9rem; transition: 0.4s; }
        .social-link:hover { color: var(--accent); transform: translateY(-5px); text-shadow: 0 0 15px var(--accent); }

        @media (max-width: 768px) {
            .card { flex: 0 0 85vw; }
            .stats-row { flex-direction: column; gap: 1.5rem; }
            .hero h1 { font-size: 4rem; }
        }
    </style>
</head>
<body>

    <div class="vignette"></div>
    <div class="fog-overlay" id="fog"></div>
    <canvas id="particles"></canvas>
    <div id="cursor"></div>

    <nav>
        <a href="#" class="logo interactive">SKETCHY<span>STUDIO</span></a>
    </nav>

    <div class="hero">
        <div class="hero-content" id="hero-content">
            <h1 class="interactive">CREATING<br>DIGITAL WORLDS</h1>
            <div class="stats-row">
                <div class="stat-item"><h4>6+</h4><p>Years in Dev</p></div>
                <div class="stat-item"><h4>12</h4><p>Active Projects</p></div>
                <div class="stat-item"><h4>30k+</h4><p>Lines of Code</p></div>
            </div>
        </div>
        <div class="scroll-indicator">
            <div class="mouse"><div class="wheel"></div></div>
            <p style="font-size: 0.6rem; letter-spacing: 2px;">SCROLL TO EXPLORE</p>
        </div>
    </div>

    <section id="projects">
        <div class="section-header">
            <h2 style="font-family: 'Montserrat'; font-size: 2.5rem;">WORKS</h2>
        </div>

        <div class="slider-wrapper">
            <div class="slider-container" id="slider">
                <!-- Projects via JS -->
            </div>
            <div class="slider-arrows">
                <div class="arrow interactive" onclick="scrollS(-1)"><i data-lucide="chevron-left"></i></div>
                <div class="arrow interactive" onclick="scrollS(1)"><i data-lucide="chevron-right"></i></div>
            </div>
        </div>
    </section>

    <footer>
        <h3 style="font-family: 'Montserrat'; letter-spacing: 2px;">JOIN THE VOID</h3>
        <div class="social-row">
            <a href="#" class="social-link interactive"><i data-lucide="youtube"></i> YouTube</a>
            <a href="#" class="social-link interactive"><i data-lucide="message-square"></i> Discord</a>
            <a href="#" class="social-link interactive"><i data-lucide="instagram"></i> Instagram</a>
        </div>
        <p style="color: #222; font-size: 0.7rem; margin-top: 4rem;">© 2026 SKETCHY STUDIO. ALL RIGHTS RESERVED.</p>
    </footer>

    <script>
        const projects = [
            { title: "Ocean Deep", desc: "A psychological horror set in a submarine.", icon: "waves" },
            { title: "Kinetic UI", desc: "Open-source library for fluid interface animations.", icon: "mouse-pointer-2" },
            { title: "Project Ghost", desc: "Experimental stealth-action mechanics in UE5.", icon: "eye-off" },
            { title: "Voxel Engine", desc: "Custom C++ renderer for infinite worlds.", icon: "box" }
        ];

        const slider = document.getElementById('slider');
        projects.forEach(p => {
            slider.innerHTML += `
                <div class="card interactive" onmousemove="tilt(event, this)" onmouseleave="untilt(this)" onclick="console.log('Project Clicked')">
                    <div class="card-glow"></div>
                    <div class="card-content">
                        <i data-lucide="${p.icon}" color="#00f2ff"></i>
                        <h3>${p.title}</h3>
                        <p>${p.desc}</p>
                    </div>
                </div>
            `;
        });
        lucide.createIcons();

        // 3D Tilt & Glow
        function tilt(e, el) {
            const r = el.getBoundingClientRect();
            const x = e.clientX - r.left;
            const y = e.clientY - r.top;
            el.style.setProperty('--mx', `${x}px`);
            el.style.setProperty('--my', `${y}px`);
            
            const rx = (y - r.height/2) / -15;
            const ry = (x - r.width/2) / 15;
            el.style.transform = `perspective(1000px) rotateX(${rx}deg) rotateY(${ry}deg) scale(1.02)`;
        }

        function untilt(el) {
            el.style.transform = `perspective(1000px) rotateX(0) rotateY(0) scale(1)`;
        }

        // Sinking Animation
        window.addEventListener('scroll', () => {
            const s = window.scrollY;
            const hero = document.getElementById('hero-content');
            const fog = document.getElementById('fog');
            
            hero.style.transform = `translateY(${s * 0.35}px)`;
            hero.style.opacity = 1 - (s / 500);
            
            if(s > 100) {
                fog.style.opacity = Math.min((s - 100) / 500, 0.8);
            } else {
                fog.style.opacity = 0;
            }
        });

        // Slider Nav
        function scrollS(dir) {
            slider.scrollBy({ left: dir * 432, behavior: 'smooth' });
        }

        // Cursor
        const cur = document.getElementById('cursor');
        document.addEventListener('mousemove', e => {
            cur.style.left = e.clientX + 'px';
            cur.style.top = e.clientY + 'px';
        });
        document.body.addEventListener('mouseover', e => {
            if(e.target.closest('.interactive')) document.body.classList.add('hovering');
        });
        document.body.addEventListener('mouseout', e => {
            if(e.target.closest('.interactive')) document.body.classList.remove('hovering');
        });

        // Particles
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let pts = [];
        function res() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = res; res();

        class Pt {
            constructor() { this.x = Math.random()*canvas.width; this.y = Math.random()*canvas.height; this.s = Math.random()*1.5; this.v = Math.random()*0.4; }
            up() { this.y -= this.v; if(this.y < 0) this.y = canvas.height; }
            dr() { ctx.fillStyle = "rgba(0,242,255,0.2)"; ctx.beginPath(); ctx.arc(this.x, this.y, this.s, 0, 7); ctx.fill(); }
        }
        for(let i=0; i<60; i++) pts.push(new Pt());
        function anim() { ctx.clearRect(0,0,canvas.width,canvas.height); pts.forEach(p=>{p.up();p.dr();}); requestAnimationFrame(anim); }
        anim();
    </script>
</body>
</html>
