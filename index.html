<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sketchy | Dev Hub</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');

        :root {
            --bg: #050505;
            --surface: rgba(20, 20, 20, 0.4);
            --surface-glass: rgba(15, 15, 15, 0.6);
            --accent-g: linear-gradient(135deg, #ff2a2a 0%, #8b5cf6 100%);
            --red: #ff2a2a;
            --purple: #8b5cf6;
            --text-main: #ededed;
            --text-muted: #888;
            --border: rgba(255, 255, 255, 0.05);
            --border-hover: rgba(139, 92, 246, 0.4);
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #333; }
        ::-webkit-scrollbar-thumb:hover { background: var(--purple); }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { 
            background-color: var(--bg); 
            color: var(--text-main); 
            overflow-x: hidden; 
            -webkit-font-smoothing: antialiased; 
        }
        
        /* Pamatuje si texturu ;) */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
        }

        .g-text { 
            background: var(--accent-g); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            font-weight: 900; 
        }
        .hidden { display: none !important; }
        .label { font-size: 0.75rem; font-weight: 700; color: var(--purple); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }

        /* Animations */
        @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate { animation: fadeUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; opacity: 0; }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }

        /* Sidebar & Overlay */
        #menu-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px);
            z-index: 1000; opacity: 0; pointer-events: none; transition: 0.4s;
        }
        #menu-overlay.active { opacity: 1; pointer-events: all; }

        #mt-btn { 
            position: fixed; top: 20px; left: 20px; z-index: 1002; background: var(--surface-glass); 
            backdrop-filter: blur(10px); border: 1px solid var(--border); padding: 12px; 
            border-radius: 12px; cursor: pointer; color: white; transition: 0.3s; 
        }
        #mt-btn:hover { border-color: var(--purple); box-shadow: 0 0 15px rgba(139, 92, 246, 0.2); }
        
        .edge-detector { position: fixed; left: 0; top: 0; width: 15px; height: 100vh; z-index: 999; }

        .sidebar { 
            position: fixed; left: -320px; top: 0; height: 100vh; width: 300px; 
            background: rgba(8, 8, 8, 0.8); backdrop-filter: blur(20px); z-index: 1001; 
            padding: 5rem 2rem 2rem; transition: 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); 
            border-right: 1px solid var(--border); display: flex; flex-direction: column; 
        }
        .sidebar.open { left: 0; box-shadow: 10px 0 30px rgba(0,0,0,0.8); }
        
        .nav-item { 
            padding: 14px 16px; font-weight: 700; color: var(--text-muted); 
            cursor: pointer; transition: 0.2s; display: flex; align-items: center; 
            gap: 12px; border-radius: 10px; margin-bottom: 5px;
        }
        .nav-item:hover, .nav-item.active { 
            color: #fff; background: rgba(255,255,255,0.05); transform: translateX(5px); 
        }

        /* Music Player */
        .music-player { 
            background: rgba(0,0,0,0.4); padding: 15px; border-radius: 16px; 
            border: 1px solid var(--border); margin-top: auto; 
        }
        .m-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .m-select { 
            background: transparent; border: none; color: var(--text-muted); 
            font-size: 0.8rem; outline: none; cursor: pointer; font-weight: 700;
        }
        .m-select option { background: #111; color: white; }
        .p-controls { display: flex; justify-content: space-between; align-items: center; margin: 15px 0 10px; }
        .p-icon { cursor: pointer; color: var(--text-muted); transition: 0.2s; }
        .p-icon:hover { color: white; transform: scale(1.1); }
        .p-progress { width: 100%; height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; }
        .p-bar { height: 100%; background: var(--accent-g); width: 0%; box-shadow: 0 0 10px var(--purple); }

        /* Main Layout */
        .main { max-width: 1000px; margin: 0 auto; padding: 6rem 1.5rem; min-height: 100vh; }

        /* UI Elements */
        .btn { 
            padding: 12px 24px; border-radius: 12px; font-weight: 700; cursor: pointer; 
            transition: 0.3s; border: none; display: inline-flex; align-items: center; gap: 8px; 
        }
        .btn-primary { background: var(--accent-g); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3); }
        .btn-secondary { background: var(--surface); color: white; border: 1px solid var(--border); }
        .btn-secondary:hover { background: rgba(255,255,255,0.05); border-color: var(--purple); }

        .bento-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .bento { background: var(--surface-glass); padding: 25px; border-radius: 20px; border: 1px solid var(--border); transition: 0.3s; }
        .bento:hover { border-color: var(--border-hover); }

        /* Projects Detail - Customization support */
        .p-window { 
            width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 20px; 
            border: 1px solid var(--border); overflow: hidden; position: relative; margin-bottom: 30px; 
        }
        .p-window img { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; }
        
        .dynamic-block { margin-bottom: 20px; width: 100%; display: flex; flex-direction: column; }
        .dynamic-block img { max-width: 100%; border: 1px solid var(--border); }

        /* Changelog */
        .ch-box { 
            padding: 20px; background: var(--surface-glass); border-radius: 16px; 
            border: 1px solid var(--border); border-left: 4px solid var(--purple); 
            margin-bottom: 15px; transition: 0.3s;
        }
        .ch-box:hover { transform: translateX(5px); background: rgba(255,255,255,0.03); }

        /* Index Popup */
        #index-popup { 
            position: fixed; inset: 0; background: rgba(5,5,5,0.98); z-index: 2000; 
            display: none; padding: 5vw; overflow-y: auto; 
        }
        .idx-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .idx-card { 
            height: 180px; border-radius: 16px; border: 1px solid var(--border); 
            position: relative; overflow: hidden; cursor: pointer; background: #000; 
        }
        .idx-card img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.3; transition: 0.4s; }
        .idx-card:hover img { opacity: 0.6; transform: scale(1.05); }
        .idx-card-content { position: relative; z-index: 2; padding: 20px; height: 100%; display: flex; flex-direction: column; justify-content: flex-end; }
        .idx-search { 
            width: 100%; background: var(--surface); border: 1px solid var(--border); 
            padding: 15px 20px; border-radius: 12px; color: white; outline: none; margin-bottom: 30px; 
        }
        .idx-search:focus { border-color: var(--purple); }

        @media (max-width: 768px) {
            .sidebar { width: 280px; }
            .main { padding: 5rem 1rem; }
        }
    </style>
</head>
<body>

    <div class="edge-detector" id="edge-detect"></div>
    <div id="menu-overlay" onclick="toggleSidebar(false)"></div>
    <div id="mt-btn" onclick="toggleSidebar(true)"><i data-lucide="menu"></i></div>

    <nav class="sidebar" id="sidebar">
        <h2 class="g-text" style="font-size: 2rem; margin-bottom: 2rem;">Sketchy.</h2>
        <div class="nav-item active" onclick="nav('home')"><i data-lucide="terminal"></i> Dashboard</div>
        <div class="nav-item" onclick="nav('projects')"><i data-lucide="folder-code"></i> Projekty</div>
        <div class="nav-item" onclick="nav('changelog')"><i data-lucide="git-commit"></i> Changelog</div>

        <div class="music-player">
            <div class="m-header">
                <span class="label" style="margin:0;">Now Playing</span>
                <select class="m-select" id="m-category" onchange="changeSong()">
                    <option value="lofi">Lo-Fi Dev</option>
                    <option value="synth">Synthwave</option>
                    <option value="cyber">Cyberpunk</option>
                </select>
            </div>
            <div style="font-weight: 700; font-size: 0.9rem;" id="m-title">Coding in the rain</div>
            <div class="p-controls">
                <i data-lucide="skip-back" class="p-icon" size="18"></i>
                <i data-lucide="pause" class="p-icon" id="m-playbtn" onclick="toggleMusic()" size="20"></i>
                <i data-lucide="skip-forward" class="p-icon" size="18"></i>
            </div>
            <div class="p-progress"><div class="p-bar" id="m-bar"></div></div>
        </div>
    </nav>

    <div id="index-popup">
        <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
            <h1 class="g-text" style="font-size: 2rem;">Databáze</h1>
            <button class="btn btn-secondary" onclick="document.getElementById('index-popup').style.display='none'">Zavřít</button>
        </div>
        <input type="text" class="idx-search" id="idxSearch" placeholder="Vyhledat projekt..." oninput="renderIndex()">
        <div id="idx-content" class="idx-grid"></div>
    </div>

    <main class="main">
        
        <section id="home">
            <div class="animate" style="margin-bottom: 3rem;">
                <div class="label">System online</div>
                <h1 style="font-size: clamp(2.5rem, 6vw, 4rem); font-weight: 900; line-height: 1.1; margin-bottom: 1rem;">
                    Code. <span class="g-text">Create.</span><br>Repeat.
                </h1>
                <p style="color: var(--text-muted); max-width: 500px; margin-bottom: 1.5rem;">
                    Roblox dev, AI explorer. Čistý UI, funkční kód.
                </p>
                <button class="btn btn-primary" onclick="nav('projects')">Otevřít Archiv</button>
            </div>

            <div class="bento-grid animate delay-1">
                <div class="bento">
                    <div class="label">Status</div>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <div style="width: 8px; height: 8px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 10px #22c55e;"></div>
                        <strong>Working on UNI</strong>
                    </div>
                </div>
                <div class="bento">
                    <div class="label">Local Time</div>
                    <div id="clock" style="font-size: 1.5rem; font-weight: 900;">00:00</div>
                </div>
            </div>
        </section>

        <section id="projects" class="hidden">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h1 class="g-text" style="font-size: 2.5rem;">Inspekce</h1>
                <button class="btn btn-secondary" onclick="document.getElementById('index-popup').style.display='block'; renderIndex();"><i data-lucide="grid" size="16"></i> Všechny</button>
            </div>
            
            <div class="p-window animate">
                <img id="p-main-img" src="">
            </div>
            <div id="p-content" class="animate delay-1"></div>
        </section>

        <section id="changelog" class="hidden">
            <h1 class="g-text animate" style="font-size: 2.5rem; margin-bottom: 2rem;">Commits</h1>
            <div id="ch-list" class="animate delay-1"></div>
        </section>

    </main>

    <script>
        // --- DATA STRUKTURA (Plná customizace je zpět) ---
        const projects = [
            { 
                name: "UNI - AI Assistant", cat: "AI", 
                img: "https://images.unsplash.com/photo-1620712943543-bcc4688e7485?w=1000&q=80", 
                content: [
                    { type: 'text', val: 'UNI Core System', size: '3rem', bold: true, align: 'center', gradient: 'var(--accent-g)', neon: true },
                    { type: 'text', val: 'Základní popis asistence inspirované Jarvisem.', size: '1rem', color: 'var(--text-muted)', align: 'center' },
                    { type: 'image', src: 'https://images.unsplash.com/photo-1555066931-4365d14bab8c?w=800&q=80', width: '80%', align: 'center', radius: '16px' }
                ] 
            },
            { 
                name: "Roblox FPS Framework", cat: "Roblox", 
                img: "https://images.unsplash.com/photo-1552820728-8b83bb6b773f?w=1000&q=80", 
                content: [
                    { type: 'text', val: 'Next-Gen Movement', size: '2rem', bold: true, align: 'left', color: '#fff' },
                    { type: 'text', val: 'Custom framework pro zbraně a pohyb hráče v Roblox Studiu.', size: '1rem', color: '#aaa', align: 'left' }
                ] 
            }
        ];

        const changelogData = [
            { ver: "v1.1 - UI Overhaul", date: "Feb 26, 2026", note: "Opraven sidebar logic, vrácena customizace bloků, autoplay music fake player, odebrán otravný marquee." },
            { ver: "v1.0 - Initial", date: "Feb 06, 2026", note: "První commit portfolia." }
        ];

        // --- SIDEBAR LOGIC (PC i Mobil) ---
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('menu-overlay');
        
        function toggleSidebar(state) {
            if(state) {
                sidebar.classList.add('open');
                overlay.classList.add('active');
            } else {
                sidebar.classList.remove('open');
                overlay.classList.remove('active');
            }
        }

        // PC detekce
        document.getElementById('edge-detect').addEventListener('mouseenter', () => toggleSidebar(true));
        sidebar.addEventListener('mouseleave', () => toggleSidebar(false));

        // Mobile Swipe detekce
        let touchStartX = 0;
        document.addEventListener('touchstart', e => touchStartX = e.touches[0].clientX);
        document.addEventListener('touchmove', e => {
            let touchEndX = e.touches[0].clientX;
            // Swipe Left (Zavřít)
            if (touchStartX - touchEndX > 50 && sidebar.classList.contains('open')) toggleSidebar(false);
            // Swipe Right (Otevřít z levého kraje)
            if (touchEndX - touchStartX > 50 && touchStartX < 30 && !sidebar.classList.contains('open')) toggleSidebar(true);
        });

        // --- NAVIGACE ---
        function nav(id) {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            event.currentTarget.classList.add('active');
            toggleSidebar(false);
            window.scrollTo(0,0);
            if(id === 'projects') loadProject(0);
        }

        // --- PROJEKTY RENDER & CUSTOMIZACE ---
        function loadProject(idx) {
            const p = projects[idx];
            document.getElementById('p-main-img').src = p.img;
            
            const container = document.getElementById('p-content');
            container.innerHTML = '';

            p.content.forEach(c => {
                const wrapper = document.createElement('div');
                wrapper.className = 'dynamic-block';
                // Alignment logic
                if(c.align === 'center') wrapper.style.alignItems = 'center';
                else if(c.align === 'right') wrapper.style.alignItems = 'flex-end';
                else wrapper.style.alignItems = 'flex-start';

                if(c.type === 'text') {
                    const el = document.createElement('div');
                    el.innerText = c.val;
                    el.style.fontSize = c.size || '1rem';
                    el.style.fontWeight = c.bold ? '900' : '500';
                    el.style.textAlign = c.align || 'left';
                    
                    if(c.gradient) {
                        el.style.background = c.gradient;
                        el.style.webkitBackgroundClip = 'text';
                        el.style.webkitTextFillColor = 'transparent';
                    } else if(c.color) {
                        el.style.color = c.color;
                    }
                    if(c.neon) el.style.textShadow = `0 0 15px var(--purple)`;
                    
                    wrapper.appendChild(el);
                } 
                else if(c.type === 'image') {
                    const img = document.createElement('img');
                    img.src = c.src;
                    img.style.width = c.width || '100%';
                    img.style.borderRadius = c.radius || '12px';
                    wrapper.appendChild(img);
                }
                container.appendChild(wrapper);
            });
            
            document.getElementById('index-popup').style.display = 'none';
        }

        // --- INDEX ARCHIV ---
        function renderIndex() {
            const q = document.getElementById('idxSearch').value.toLowerCase();
            const grid = document.getElementById('idx-content');
            grid.innerHTML = '';
            
            projects.forEach((p, i) => {
                if(p.name.toLowerCase().includes(q) || p.cat.toLowerCase().includes(q)) {
                    grid.innerHTML += `
                        <div class="idx-card" onclick="nav('projects'); loadProject(${i});">
                            <img src="${p.img}">
                            <div class="idx-card-content">
                                <div class="label">${p.cat}</div>
                                <div style="font-weight:900; font-size:1.2rem;">${p.name}</div>
                            </div>
                        </div>`;
                }
            });
        }

        // --- MUSIC PLAYER ---
        let isPlaying = true; // Autoplay ON
        let mProg = 0;
        const songs = { lofi: "Coding in the rain", synth: "Neon Grid", cyber: "Data Breach" };
        
        function toggleMusic() {
            isPlaying = !isPlaying;
            document.getElementById('m-playbtn').setAttribute('data-lucide', isPlaying ? 'pause' : 'play');
            lucide.createIcons();
        }
        function changeSong() {
            const cat = document.getElementById('m-category').value;
            document.getElementById('m-title').innerText = songs[cat];
            mProg = 0;
            if(!isPlaying) toggleMusic();
        }
        setInterval(() => {
            if(isPlaying) {
                mProg = (mProg >= 100) ? 0 : mProg + 0.5;
                document.getElementById('m-bar').style.width = mProg + '%';
            }
        }, 500);

        // --- UTILS ---
        setInterval(() => { 
            const d = new Date();
            document.getElementById('clock').innerText = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0'); 
        }, 1000);

        changelogData.forEach(ch => {
            document.getElementById('ch-list').innerHTML += `
                <div class="ch-box">
                    <div class="label">${ch.date}</div>
                    <div style="font-size: 1.2rem; font-weight: 700; margin-bottom: 5px;">${ch.ver}</div>
                    <div style="color: var(--text-muted); font-size: 0.9rem;">${ch.note}</div>
                </div>`;
        });

        lucide.createIcons();
    </script>
</body>
</html>
